<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>思考与Q&A — WILTW 知识库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 1rem 2rem; }
header h1 { font-size: 1.3rem; }
header p { opacity: 0.7; font-size: 0.8rem; margin-top: 0.2rem; }

/* Layout */
.layout { display: flex; height: calc(100vh - 90px); }
.sidebar { width: 240px; background: #fff; border-right: 1px solid #e0e0e0; overflow-y: auto; padding: 1rem 0; flex-shrink: 0; }
.content { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }

/* Sidebar */
.product-item { padding: 0.6rem 1.5rem; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; transition: background 0.15s; border-left: 3px solid transparent; }
.product-item:hover { background: #f5f5f5; }
.product-item.active { background: #fdfaf0; border-left-color: #e0c068; font-weight: 600; color: #1a1a2e; }
.product-item .count { font-size: 0.7rem; background: #e0e0e0; color: #666; padding: 0.1rem 0.4rem; border-radius: 8px; margin-left: auto; }
.product-item.active .count { background: #e0c068; color: #1a1a2e; }
.product-item.all { border-bottom: 1px solid #eee; margin-bottom: 0.5rem; padding-bottom: 0.8rem; font-weight: 600; }

/* QA Cards */
.qa-card { background: #fff; border-radius: 8px; padding: 1.2rem 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-left: 4px solid #e0c068; }
.qa-card .qa-meta { display: flex; gap: 0.8rem; align-items: center; margin-bottom: 0.5rem; flex-wrap: wrap; font-size: 0.8rem; }
.qa-card .qa-date { color: #888; background: #f5f5f5; padding: 0.1rem 0.5rem; border-radius: 4px; }
.qa-card .qa-product { font-weight: 600; color: #1a1a2e; }
.qa-card .qa-category { background: #e8f5e9; color: #2e7d32; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
.qa-card .qa-question { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.5rem; color: #1a1a2e; cursor: pointer; }
.qa-card .qa-question:hover { color: #c9a840; }
.qa-card .qa-answer { font-size: 0.9rem; color: #555; line-height: 1.7; display: none; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #f0f0f0; }
.qa-card .qa-answer h3 { font-size: 1rem; color: #1a1a2e; margin: 0.6rem 0 0.3rem; }
.qa-card .qa-answer h2 { font-size: 1.05rem; color: #1a1a2e; margin: 0.8rem 0 0.4rem; }
.qa-card .qa-answer strong { color: #333; }
.qa-card .qa-answer strong.section { color: #1a1a2e; display: block; margin-top: 0.8rem; font-size: 0.95rem; }
.qa-card .qa-answer ul { margin: 0.3rem 0; padding-left: 1.2rem; }
.qa-card .qa-answer li { margin-bottom: 0.15rem; }
.qa-card .qa-answer p { margin: 0.3rem 0; }
.qa-card.expanded .qa-answer { display: block; }
.qa-card .qa-findings { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
.qa-card .finding-tag { font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 10px; background: #fff3e0; color: #e65100; }
.qa-card .qa-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.3rem; }
.qa-card .qa-tag { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 10px; background: #f0f0f0; color: #666; }

/* Delete */
.qa-card { position: relative; }
.qa-card .del-btn { position: absolute; top: 0.6rem; right: 0.8rem; width: 24px; height: 24px; border: none; background: transparent; color: #ccc; font-size: 1.1rem; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1; }
.qa-card .del-btn:hover { color: #e74c3c; background: #fdf0ef; }
.qa-card.marked { border-left-color: #e74c3c; background: #fffafa; opacity: 0.85; }
.qa-card.marked .del-btn { color: #e74c3c; background: #fdf0ef; }
.del-toolbar { display: none; align-items: center; gap: 0.8rem; margin-bottom: 1rem; padding: 0.6rem 1rem; background: #fdf0ef; border: 1px solid #f5c6cb; border-radius: 6px; font-size: 0.85rem; }
.del-toolbar.visible { display: flex; }
.del-toolbar .del-count { color: #c0392b; font-weight: 600; }
.del-toolbar button { padding: 0.35rem 0.8rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
.del-toolbar .btn-copy { background: #e74c3c; color: #fff; }
.del-toolbar .btn-copy:hover { background: #c0392b; }
.del-toolbar .btn-clear { background: #fff; color: #666; border: 1px solid #ddd; }
.del-toolbar .btn-clear:hover { background: #f5f5f5; }

/* Search */
.search-bar { margin-bottom: 1.5rem; display: flex; gap: 0.5rem; }
.search-bar input { flex: 1; padding: 0.5rem 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
.search-bar select { padding: 0.5rem 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; background: #fff; }

.empty { text-align: center; padding: 3rem; color: #888; }
.loading { text-align: center; padding: 3rem; color: #888; }

@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; max-height: 200px; border-right: none; border-bottom: 1px solid #e0e0e0; }
  .content { padding: 1rem; }
}
</style>
</head>
<body>
<header><h1>💡 思考与Q&A</h1><p>零散回测与统计分析问答库 · <span id="headerStats"></span></p></header>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 搜索问答内容..." oninput="render()">
      <select id="catFilter" onchange="render()">
        <option value="all">全部分类</option>
      </select>
    </div>
    <div class="del-toolbar" id="delToolbar">
      <span>🗑️ 已标记 <span class="del-count" id="delCount">0</span> 个待删除</span>
      <button class="btn-copy" onclick="copyDeleteList()">📋 复制列表</button>
      <button class="btn-clear" onclick="clearDeleteMarks()">✕ 清除标记</button>
    </div>
    <div id="qaList"><div class="loading">⏳ 加载中...</div></div>
  </div>
</div>
<script>
let data = {entries:[], products:{}};
let activeProduct = 'all';
let marked = new Set();

fetch('data/index.json')
  .then(r => r.json())
  .then(d => {
    data = d;
    init();
  })
  .catch(e => {
    document.getElementById('qaList').innerHTML = '<div class="empty">❌ 加载失败: ' + e.message + '</div>';
  });

function init() {
  document.getElementById('headerStats').textContent = data.entries.length + ' 条问答 · ' + Object.keys(data.products).length + ' 个品种';
  
  // Sidebar
  let html = '<div class="product-item all active" onclick="selectProduct(\'all\')">📋 全部问答 <span class="count">' + data.entries.length + '</span></div>';
  for (let code of Object.keys(data.products).sort()) {
    let count = data.entries.filter(e => e.product_code === code).length;
    html += '<div class="product-item" onclick="selectProduct(\'' + code + '\')">' + data.products[code] + ' <span class="count">' + count + '</span></div>';
  }
  document.getElementById('sidebar').innerHTML = html;
  
  // Category filter
  let cats = new Set(data.entries.map(e => e.category));
  let cf = document.getElementById('catFilter');
  cats.forEach(c => {
    let o = document.createElement('option');
    o.value = c; o.textContent = c; cf.appendChild(o);
  });
  
  render();
}

function selectProduct(code) {
  activeProduct = code;
  document.querySelectorAll('.product-item').forEach(el => el.classList.remove('active'));
  let items = document.querySelectorAll('.product-item');
  for (let el of items) {
    if ((code === 'all' && el.classList.contains('all')) || el.textContent.includes(data.products[code])) {
      el.classList.add('active');
    }
  }
  render();
}

function render() {
  let q = document.getElementById('searchInput').value.toLowerCase();
  let cf = document.getElementById('catFilter').value;
  
  let entries = data.entries;
  if (activeProduct !== 'all') {
    entries = entries.filter(e => e.product_code === activeProduct);
  }
  if (cf !== 'all') {
    entries = entries.filter(e => e.category === cf);
  }
  if (q) {
    entries = entries.filter(e => (e.question + ' ' + (e.answer||'') + ' ' + (e.tags||[]).join(' ')).toLowerCase().includes(q));
  }
  
  // Sort by date descending
  entries.sort((a,b) => b.date.localeCompare(a.date));
  
  let list = document.getElementById('qaList');
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty">📭 没有匹配的问答</div>';
    return;
  }
  
  list.innerHTML = entries.map(e => {
    let isMarked = marked.has(e.id);
    let fid = e.id.replace(/'/g, "\\'");
    let findings = (e.key_findings || []).map(f => '<span class="finding-tag">💡 ' + f + '</span>').join('');
    let tags = (e.tags || []).map(t => '<span class="qa-tag">#' + t + '</span>').join('');
    return '<div class="qa-card' + (isMarked ? ' marked' : '') + '" id="card-' + fid + '">' +
      '<button class="del-btn" onclick="event.stopPropagation();markDelete(\'' + fid + '\')" title="标记删除">×</button>' +
      '<div class="qa-meta" onclick="toggleCard(\'' + fid + '\')">' +
        '<span class="qa-date">' + e.date + '</span>' +
        '<span class="qa-product">' + e.product + '</span>' +
        '<span class="qa-category">' + e.category + '</span>' +
      '</div>' +
      '<div class="qa-question" onclick="toggleCard(\'' + fid + '\')">' + e.question + '</div>' +
      (findings ? '<div class="qa-findings" onclick="toggleCard(\'' + fid + '\')">' + findings + '</div>' : '') +
      (tags ? '<div class="qa-tags" onclick="toggleCard(\'' + fid + '\')">' + tags + '</div>' : '') +
      '<div class="qa-answer">' + renderMarkdown(e.answer || '') + '</div>' +
    '</div>';
  }).join('');
  updateDelToolbar();
}

function toggleCard(id) {
  let card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('expanded');
}

// --- Markdown renderer ---
function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    // Escape HTML
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Headers: ### Title
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    // Bold: **text**
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Chinese section headers: 【text】
    .replace(/【(.+?)】/g, '<strong class="section">【$1】</strong>')
    // Unordered list: consecutive lines starting with - or •
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^• (.+)$/gm, '<li>$1</li>')
    // Wrap adjacent <li>s in <ul>
    .replace(/((?:<li>.*?<\/li>\n?)+)/g, '<ul>$1</ul>')
    // Double newline → paragraph break
    .replace(/\n\n+/g, '</p><p>')
    // Single newline → <br> inside paragraphs
    .replace(/\n/g, '<br>');
  // Wrap in paragraph if not already
  if (!html.startsWith('<h') && !html.startsWith('<ul') && !html.startsWith('<p>')) {
    html = '<p>' + html;
  }
  if (!html.endsWith('</p>') && !html.endsWith('</ul>') && !html.endsWith('</h3>') && !html.endsWith('</h2>')) {
    html = html + '</p>';
  }
  // Clean empty <p></p>
  html = html.replace(/<p><\/p>/g, '');
  return html;
}

// --- Delete functions ---
function markDelete(id) {
  if (marked.has(id)) marked.delete(id); else marked.add(id);
  render();
}

function updateDelToolbar() {
  let tb = document.getElementById('delToolbar');
  let cnt = document.getElementById('delCount');
  tb.classList.toggle('visible', marked.size > 0);
  cnt.textContent = marked.size;
}

function copyDeleteList() {
  let ids = Array.from(marked).sort().join('\n');
  let text = '请删除以下 Q&A 条目：\n' + ids;
  navigator.clipboard.writeText(text).then(() => {
    let btn = document.querySelector('.btn-copy');
    let orig = btn.textContent;
    btn.textContent = '✅ 已复制！发给 Hermes 处理';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function clearDeleteMarks() {
  marked.clear();
  render();
}
</script>
</body>
</html>
