// Render period list
const listEl = document.getElementById('period-list');
TREND_PERIODS.forEach(function(p, i) {
  var div = document.createElement('div');
  div.className = 'period-item';
  div.id = 'period-' + i;
  var trendClass = '';
  if (p.trend === 'uptrend') trendClass = 'uptrend';
  else if (p.trend === 'downtrend') trendClass = 'downtrend';
  else trendClass = 'range';
  div.innerHTML = '<div class="p-header"><span class="p-trend ' + trendClass + '">' + p.trend_cn + '</span><span class="p-days">' + p.days + '天</span></div><div class="p-dates">' + p.start + ' → ' + p.end + '</div>';
  div.onclick = (function(idx) { return function() { selectPeriod(idx); }; })(i);
  listEl.appendChild(div);
});

// Plotly chart
var layout = {
  template: 'plotly_dark',
  paper_bgcolor: '#1a1a2e',
  plot_bgcolor: '#1a1a2e',
  font: { color: '#e0e0e0', size: 11 },
  xaxis: {
    type: 'date',
    rangeslider: { visible: false },
    gridcolor: '#2a2a4a',
    showgrid: true,
    rangebreaks: [
      {bounds: ['sat', 'mon']}
    ]
  },
  yaxis: {
    title: '工业硅',
    gridcolor: '#2a2a4a',
    showgrid: true,
    autorange: true
  },
  shapes: PLOT_DATA.shapes || [],
  margin: { l: 60, r: 30, t: 30, b: 40 },
  hovermode: 'x unified',
  legend: { orientation: 'h', y: 1.12, font: { size: 10 } },
  dragmode: 'pan'
};

Plotly.newPlot('plot', PLOT_DATA.data, layout, { responsive: true, displayModeBar: true });

// Period selection
var activePeriod = null;

function selectPeriod(idx) {
  var items = document.querySelectorAll('.period-item');
  for (var i = 0; i < items.length; i++) { items[i].classList.remove('active'); }
  var item = document.getElementById('period-' + idx);
  if (item) item.classList.add('active');
  
  activePeriod = idx;
  var p = TREND_PERIODS[idx];
  
  Plotly.relayout('plot', {
    'xaxis.range': [p.start, p.end],
    'xaxis.autorange': false
  });
  
  var detail = PERIOD_DETAILS[idx];
  var panel = document.getElementById('detail-panel');
  
  if (!detail) {
    panel.innerHTML = '<h3>🔍 详情</h3><div class="no-data">该时段数据不足</div>';
    return;
  }
  
  var trendColors = {uptrend: '#ff5050', downtrend: '#00c864', range: '#999'};
  var color = trendColors[detail.trend] || '#999';
  
  var topMaHtml = '';
  if (detail.top_mas && detail.top_mas.length > 0) {
    topMaHtml = '<table class="ma-table"><tr><th>均线</th><th>成功率</th><th>触碰</th></tr>';
    for (var j = 0; j < detail.top_mas.length; j++) {
      var m = detail.top_mas[j];
      var barColor = m.rate >= 70 ? '#00c864' : m.rate >= 50 ? '#ff9800' : '#ff5050';
      topMaHtml += '<tr><td><b>' + m.ma + '</b></td><td><span class="rate-bar" style="width:' + m.rate + 'px;background:' + barColor + '"></span>' + m.rate + '%</td><td>' + m.touches + '次</td></tr>';
    }
    topMaHtml += '</table>';
  } else {
    topMaHtml = '<div class="no-data">触碰次数不足，无法评估</div>';
  }

  var trendLabel = detail.trend === 'uptrend' ? '📌 最佳支撑均线' : detail.trend === 'downtrend' ? '📌 最佳压制均线' : '📌 有效边界均线';
  
  panel.innerHTML = '<h3>🔍 趋势段详情</h3>' +
    '<div class="trend-badge" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '">' + detail.trend_cn + '</div>' +
    '<p style="font-size:13px;color:#aaa;margin:8px 0">' + detail.start + ' → ' + detail.end + '</p>' +
    '<p style="font-size:12px;color:#888">持续 <b>' + detail.days + '</b> 个交易日</p>' +
    '<h3 style="margin-top:18px;">' + trendLabel + '</h3>' +
    topMaHtml +
    '<p style="font-size:10px;color:#555;margin-top:15px;">💡 成功率 = 触碰后有效反弹/回落次数 ÷ 总触碰次数</p>';
}

document.getElementById('plot').on('plotly_doubleclick', function() {
  activePeriod = null;
  var items = document.querySelectorAll('.period-item');
  for (var i = 0; i < items.length; i++) { items[i].classList.remove('active'); }
  document.getElementById('detail-panel').innerHTML = '<h3>🔍 选择趋势段查看详情</h3><div class="no-data">👈 点击左侧趋势段<br>查看该时期的均线支撑/压制详情</div>';
  Plotly.relayout('plot', { 'xaxis.autorange': true });
});
