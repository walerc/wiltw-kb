<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>WILTW 知识库 — 13D Research</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 1.2rem 2rem; }
header h1 { font-size: 1.4rem; font-weight: 700; }
header p { opacity: 0.7; font-size: 0.8rem; margin-top: 0.2rem; }
/* Tab nav */
.nav-tabs { background: #fff; padding: 0 2rem; display: flex; gap: 0; border-bottom: 2px solid #e0e0e0; }
.nav-tab { padding: 0.7rem 1.5rem; font-size: 0.9rem; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; font-weight: 500; }
.nav-tab:hover { color: #333; }
.nav-tab.active { color: #1a1a2e; border-bottom-color: #e0c068; font-weight: 700; }
#wiltw-panel, #futures-panel, #ta-panel, #qa-panel, #trend-panel, #pattern-panel, #channel-panel, #hourly-panel { display: none; }
#wiltw-panel.active, #futures-panel.active, #ta-panel.active, #qa-panel.active, #trend-panel.active, #pattern-panel.active, #channel-panel.active, #hourly-panel.active { display: block; }
#futures-panel iframe, #ta-panel iframe { width: 100%; height: calc(100vh - 130px); border: none; border-radius: 8px; background: #f0f2f5; }
/* WILTW panel styles */
.toolbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0.8rem 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; position: sticky; top: 0; z-index: 10; }
.toolbar input { flex: 1; min-width: 180px; padding: 0.5rem 0.8rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
.toolbar input[type="date"] { flex: 0; min-width: 130px; }
.toolbar select { padding: 0.5rem 0.8rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; background: #fff; }
.toolbar .stats { font-size: 0.8rem; color: #888; white-space: nowrap; }
.toolbar .date-sep { color: #999; font-size: 0.85rem; }
.toolbar .quick-dates { display: flex; gap: 0.3rem; }
.toolbar .quick-dates button { padding: 0.2rem 0.5rem; border: 1px solid #ddd; border-radius: 4px; background: #fff; font-size: 0.72rem; cursor: pointer; white-space: nowrap; }
.toolbar .quick-dates button:hover { border-color: #e0c068; background: #fdfaf0; }
.main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
.tags-bar { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
.tag { padding: 0.25rem 0.7rem; border-radius: 20px; font-size: 0.78rem; cursor: pointer; border: 1px solid #ddd; background: #fff; transition: all 0.2s; user-select: none; }
.tag:hover { border-color: #e0c068; background: #fdfaf0; }
.tag.active { background: #e0c068; color: #1a1a2e; border-color: #c9a840; font-weight: 600; }
.cat-section { margin-bottom: 2rem; }
.cat-header { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; padding: 0.5rem 0; border-bottom: 2px solid #e0c068; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
.cat-header .count { background: #e0c068; color: #1a1a2e; font-size: 0.75rem; padding: 0.1rem 0.5rem; border-radius: 10px; }
.report-card { background: #fff; border-radius: 8px; padding: 1.2rem 1.5rem; margin-bottom: 0.8rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer; transition: all 0.2s; border-left: 4px solid transparent; }
.report-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-1px); }
.report-card .meta { display: flex; gap: 0.8rem; align-items: center; margin-bottom: 0.4rem; flex-wrap: wrap; }
.report-card .date { font-size: 0.8rem; color: #888; background: #f5f5f5; padding: 0.15rem 0.5rem; border-radius: 4px; }
.report-card .cat-badge { font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 4px; }
.cat-投资策略 { background: #e3f2fd; color: #1565c0; }
.cat-贵金属 { background: #fff3e0; color: #e65100; }
.cat-中国宏观经济 { background: #fce4ec; color: #c62828; }
.cat-科技与社会 { background: #e8f5e9; color: #2e7d32; }
.cat-关键矿产 { background: #f3e5f5; color: #6a1b9a; }
.cat-地缘政治 { background: #eceff1; color: #37474f; }
.cat-产业投资 { background: #e0f7fa; color: #006064; }
.cat-思想与人文 { background: #fff8e1; color: #f57f17; }
.cat-环境与健康 { background: #e8eaf6; color: #283593; }
.cat-农业 { background: #fffde7; color: #f9a825; }
.cat-电动车 { background: #e1f5fe; color: #0277bd; }
.cat-教育与社会 { background: #fce4ec; color: #ad1457; }
.cat-宏观与政策 { background: #e8f5e9; color: #1b5e20; }
.report-card h3 { font-size: 1rem; margin-bottom: 0.3rem; }
.report-card .summary { font-size: 0.85rem; color: #555; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.report-card .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.5rem; }
.mini-tag { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 10px; background: #f0f0f0; color: #666; }
.report-card.has-full { border-left-color: #4caf50; }
.report-card.meta-only { border-left-color: #ff9800; }
.report-badge { font-size: 0.7rem; padding: 0.1rem 0.5rem; border-radius: 10px; margin-left: 0.5rem; }
.report-badge.full { background: #e8f5e9; color: #2e7d32; }
.report-badge.meta { background: #fff3e0; color: #e65100; }
.modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
.modal.active { display: block; }
.modal-content { background: #fff; margin: 2rem auto; max-width: 960px; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.modal-header { padding: 1.2rem 1.5rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; border-radius: 12px 12px 0 0; z-index: 1; }
.modal-header h2 { font-size: 1.2rem; }
.modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #888; padding: 0.3rem; }
.modal-body { padding: 1.5rem; max-height: 70vh; overflow-y: auto; }
.modal-body h3 { font-size: 1rem; color: #1a1a2e; margin: 1rem 0 0.5rem; padding-top: 0.5rem; border-top: 1px solid #f0f0f0; }
.modal-body .section-summary { background: #f9f9f9; padding: 0.8rem 1rem; border-radius: 6px; margin: 0.3rem 0 0.8rem; font-size: 0.9rem; line-height: 1.7; }
.modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #eee; display: flex; gap: 0.8rem; }
.modal-footer button { padding: 0.5rem 1.2rem; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; font-size: 0.9rem; background: #fff; }
.modal-footer .btn-primary { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.modal-footer .btn-primary:hover { background: #2d2d4e; }
.modal-footer .btn-primary:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
.empty { text-align: center; padding: 3rem; color: #888; }
.loading { text-align: center; padding: 3rem; color: #888; font-size: 1.2rem; }
@media (max-width: 768px) { .toolbar { padding: 0.8rem 1rem; } .main { padding: 1rem; } .report-card { padding: 1rem; } .modal-content { margin: 0; border-radius: 0; min-height: 100vh; } .nav-tabs { padding: 0 0.5rem; overflow-x: auto; } }
</style>
</head>
<body>
<header><h1>📚 WILTW 知识库</h1><p>13D Research & Strategy · "What I Learned This Week" 中文知识库 · <span id="headerStats"></span></p></header>
<div class="nav-tabs">
  <button class="nav-tab active" onclick="switchTab('wiltw')">📚 WILTW 报告</button>
  <button class="nav-tab" onclick="switchTab('futures')">📊 期货季节性</button>
  <button class="nav-tab" onclick="switchTab('ta')">📈 技术分析</button>
  <button class="nav-tab" onclick="switchTab('qa')">💡 思考与Q&A</button>
  <button class="nav-tab" onclick="switchTab('trend')">📉 趋势分析</button>
  <button class="nav-tab" onclick="switchTab('channel')">📐 通道投影</button>
  <button class="nav-tab" onclick="switchTab('pattern')">📊 形态检测</button>
  <button class="nav-tab" onclick="switchTab('hourly')">⏱ 小时线形态</button>
</div>
<div id="wiltw-panel" class="active">
<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 搜索报告内容、标签、关键词..." oninput="filterReports()">
  <select id="catFilter" onchange="filterReports()"><option value="all">全部分类</option></select>
  <span class="date-sep">📅</span>
  <input type="date" id="dateFrom" onchange="filterReports()" title="起始日期">
  <span class="date-sep">→</span>
  <input type="date" id="dateTo" onchange="filterReports()" title="结束日期">
  <span class="quick-dates">
    <button onclick="setDateQuick(3)">近3月</button>
    <button onclick="setDateQuick(6)">近6月</button>
    <button onclick="setDateQuick(12)">近1年</button>
    <button onclick="clearDateFilter()">全部</button>
  </span>
  <span class="stats" id="stats">加载中...</span>
</div>
<div class="main">
  <div class="tags-bar" id="tagCloud"></div>
  <div id="reportList"><div class="loading">⏳ 加载数据中...</div></div>
</div>
</div>
<div id="futures-panel">
  <iframe id="futuresFrame" src="futures-seasonal/index.html" style="width:100%;height:calc(100vh - 130px);border:none;"></iframe>
</div>
<div id="ta-panel">
  <iframe id="taFrame" src="ta/index.html" style="width:100%;height:calc(100vh - 130px);border:none;"></iframe>
</div>
<div id="qa-panel">
  <iframe id="qaFrame" src="qa/index.html" style="width:100%;height:calc(100vh - 130px);border:none;"></iframe>
</div>
<div id="trend-panel">
  <iframe id="trendFrame" src="trend-analysis/index.html" style="width:100%;height:calc(100vh - 130px);border:none;"></iframe>
</div>
<div id="channel-panel">
  <iframe id="channelFrame" src="channels/index.html" style="width:100%;height:calc(100vh - 130px);border:none;"></iframe>
</div>
<div id="pattern-panel">
  <iframe id="patternFrame" src="patterns/index.html" style="width:100%;height:calc(100vh - 130px);border:none;"></iframe>
</div>
<div id="hourly-panel">
  <iframe id="hourlyFrame" src="hourly-patterns/index.html" style="width:100%;height:calc(100vh - 130px);border:none;"></iframe>
</div>
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header"><h2 id="modalTitle"></h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-primary" id="btnOpenReport">📄 查看完整报告</button>
      <button onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>
<script>
let data=null,activeTag=null,currentReportId=null;

// Load data from external JSON
fetch('wiltw_data.json')
  .then(r=>r.json())
  .then(d=>{data=d;init()})
  .catch(e=>{document.getElementById('reportList').innerHTML='<div class="empty">❌ 数据加载失败: '+e.message+'</div>'});

function switchTab(tab){
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#wiltw-panel,#futures-panel,#ta-panel,#qa-panel,#trend-panel,#channel-panel,#pattern-panel,#hourly-panel').forEach(p=>p.classList.remove('active'));
  var idx=tab==='wiltw'?0:tab==='futures'?1:tab==='ta'?2:tab==='qa'?3:tab==='trend'?4:tab==='channel'?5:tab==='pattern'?6:7;
  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  document.getElementById(tab+'-panel').classList.add('active');
  if(tab==='futures'&&!document.getElementById('futuresFrame').src)
    document.getElementById('futuresFrame').src='futures-seasonal/index.html';
  if(tab==='ta'&&!document.getElementById('taFrame').src)
    document.getElementById('taFrame').src='ta/index.html';
  if(tab==='qa'&&!document.getElementById('qaFrame').src)
    document.getElementById('qaFrame').src='qa/index.html';
  if(tab==='trend'&&!document.getElementById('trendFrame').src)
    document.getElementById('trendFrame').src='trend-analysis/index.html';
  if(tab==='channel'&&!document.getElementById('channelFrame').src)
    document.getElementById('channelFrame').src='channels/index.html';
  if(tab==='pattern'&&!document.getElementById('patternFrame').src)
    document.getElementById('patternFrame').src='patterns/index.html';
  if(tab==='hourly'&&!document.getElementById('hourlyFrame').src)
    document.getElementById('hourlyFrame').src='hourly-patterns/index.html';
}
function init(){
  document.getElementById('headerStats').textContent=data.total_completed+'/'+data.reports.length+' 完整翻译';
  var c=document.getElementById('catFilter');
  data.categories.forEach(function(x){
    var n=0;
    data.reports.forEach(function(r){r.sections.forEach(function(s){if(s.category===x)n++})});
    var o=document.createElement('option');
    o.value=x;o.textContent=x+' ('+n+')';c.appendChild(o);
  });
  renderTagCloud();filterReports();
}
function renderTagCloud(){
  var t=activeTag?[activeTag].concat(data.all_tags.filter(function(x){return x!==activeTag})):data.all_tags;
  document.getElementById('tagCloud').innerHTML=t.map(function(x){
    return '<span class="tag '+(x===activeTag?'active':'')+'" onclick="toggleTag(&#39;'+x.replace(/&/g,'&amp;').replace(/'/g,'&#39;')+'&#39;)">'+x+'</span>';
  }).join('');
}
function toggleTag(t){activeTag=activeTag===t?null:t;renderTagCloud();filterReports();}
function filterReports(){
  var q=document.getElementById('searchInput').value.toLowerCase();
  var cf=document.getElementById('catFilter').value;
  var df=document.getElementById('dateFrom').value;
  var dt=document.getElementById('dateTo').value;
  var vs=[];
  data.reports.forEach(function(r){
    if(df&&r.date<df)return;
    if(dt&&r.date>dt)return;
    r.sections.forEach(function(s){
      if(cf!=='all'&&s.category!==cf)return;
      if(activeTag&&s.tags.indexOf(activeTag)===-1)return;
      if(q){
        var st=(s.title+' '+s.summary+' '+s.tags.join(' ')).toLowerCase();
        if(st.indexOf(q)===-1)return;
      }
      vs.push({report:r,section:s});
    });
  });
  var filteredReports=new Set(vs.map(function(v){return v.report.report_id})).size;
  document.getElementById('stats').textContent='共 '+data.reports.length+' 期报告 · '+filteredReports+' 期匹配 · '+vs.length+' 个条目';
  var g={};
  vs.forEach(function(v){
    if(!g[v.section.category])g[v.section.category]=[];
    g[v.section.category].push(v);
  });
  var l=document.getElementById('reportList');
  if(vs.length===0){
    l.innerHTML='<div class="empty">📭 没有匹配的内容</div>';return;
  }
  l.innerHTML=Object.entries(g).map(function(e){
    var cat=e[0],items=e[1];
    return '<div class="cat-section"><div class="cat-header">'+cat+' <span class="count">'+items.length+'</span></div>'+items.map(function(v){
      var r=v.report,s=v.section;
      return '<div class="report-card cat-'+cat+(r.has_full?' has-full':' meta-only')+'" onclick="openDetail(&#39;'+r.report_id+'&#39;,&#39;'+s.id+'&#39;)"><div class="meta"><span class="date">📅 '+r.date+'</span>'+(r.has_full?'<span class="report-badge full">✓ PDF</span>':'<span class="report-badge meta">⏳</span>')+'<span class="cat-badge cat-'+cat+'">'+cat+'</span></div><h3>'+s.id+'. '+s.title+'</h3><div class="summary">'+s.summary+'</div><div class="tags">'+s.tags.map(function(t){return '<span class="mini-tag">#'+t+'</span>'}).join(' ')+'</div></div>';
    }).join('')+'</div>';
  }).join('');
}
function setDateQuick(months){
  var d=new Date();d.setMonth(d.getMonth()-months);
  document.getElementById('dateFrom').value=d.toISOString().slice(0,10);
  document.getElementById('dateTo').value='';filterReports();
}
function clearDateFilter(){
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';filterReports();
}
function openDetail(rid,sid){
  var r=data.reports.find(function(x){return x.report_id===rid});
  if(!r)return;
  var s=r.sections.find(function(x){return x.id===sid})||r.sections[0];
  currentReportId=rid;
  document.getElementById('modalTitle').textContent=r.date+' · '+s.title;
  document.getElementById('modalBody').innerHTML='<p style="color:#888;margin-bottom:1rem">📰 '+r.publisher+' · 共'+r.total_pages+'页 · '+r.sections.length+' 个主题</p>'+r.sections.map(function(x){
    return '<h3 style="color:'+(x.id===sid?'#e0c068':'#888')+'">'+x.id+'. '+x.title+' <span style="font-size:0.75rem;font-weight:normal">['+x.pages+'页]</span></h3><div class="section-summary">'+x.summary+'</div><div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:1rem">'+x.tags.map(function(t){return '<span class="mini-tag">#'+t+'</span>'}).join(' ')+'</div>';
  }).join('');
  var b=document.getElementById('btnOpenReport');
  if(r.has_full){
    b.disabled=false;b.textContent='📄 查看完整中文报告 (PDF)';
    b.style.background='#1a1a2e';b.style.color='#fff';
    b.onclick=function(){window.open('reports/'+rid+'-mono.pdf','_blank')};
  }else{
    b.disabled=true;b.textContent='⏳ 翻译生成中...';
    b.style.background='#ccc';b.style.color='#666';b.onclick=null;
  }
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow='';
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeModal();
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
});
</script>
</body>
</html>
