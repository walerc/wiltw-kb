线索。"}, {"id": "08", "title": "墨西哥贩毒集团", "title_en": "Mexico Drug Cartels", "category": "地缘政治", "tags": ["墨西哥", "贩毒集团", "CJNG", "锡那罗亚", "美墨关系"], "pages": "44-47", "summary": "墨西哥贩毒集团的历史演变、CJNG与锡那罗亚集团的结构、美国-墨西哥关系困境及持续暴力问题。美方施压未能遏制势力扩张。"}, {"id": "09", "title": "中国主导人形机器人产业", "title_en": "China's Humanoid Robot Dominance", "category": "科技与社会", "tags": ["人形机器人", "中国制造", "中美技术竞争", "供应链", "NdFeB磁体", "稀土"], "pages": "48-55", "summary": "中国人形机器人从研发到大规模部署，以产业规模开发全价值链。中国型号售价低至5,900美元，持有全球近50%专利、控制63%供应链。13D技术军备竞赛指数新增相关公司。"}, {"id": "10", "title": "南澳大利亚可再生能源转型", "title_en": "South Australia's Renewable Transition", "category": "环境与健康", "tags": ["可再生能源", "南澳大利亚", "电池储能", "太阳能", "风能", "电价"], "pages": "56-60", "summary": "南澳已完成世界领先的能源转型，可再生能源占比84%，目标2027年100%。电价暴跌30%，电池储能是关键。全球去年电池储能容量创纪录增长65%，电池相对于化石燃料成本优势扩大。"}, {"id": "11", "title": "文学小说与同理心研究", "title_en": "Literary Fiction & Empathy", "category": "思想与人文", "tags": ["文学小说", "同理心", "心智理论", "乔治·桑德斯", "Keith Oatley", "阅读研究"], "pages": "61-64", "summary": "学术研究表明阅读文学小说可增强同理心并提升社交能力。Keith Oatley的研究和乔治·桑德斯等作家的实践表明，文学阅读培养心智理论（Theory of Mind），减少偏见。"}], "has_full": true}, {"report_id": "WILTW-2026-03-05", "date": "2026-03-05", "title": "What I Learned This Week", "publisher": "13D Research & Strategy", "total_pages": 64, "sections": [{"id": "00", "title": "策略与资产配置及高信念投资理念表现", "title_en": "Strategy & Asset Allocation and High Conviction Ideas Performance", "category": "投资策略", "tags": ["策略", "资产配置", "高信念投资", "大宗商品", "13D指数"], "pages": "3-4", "summary": "自2020年以来，13D持续主张市场正经历范式转换，新领导者将是大宗商品和通胀敏感板块。13D高信念投资组合年初至今上涨6.9%（等权重），石油天然气指数跑赢标普500指数30个百分点。"}, {"id": "01", "title": "中国对日本实施军民两用物项出口禁令", "title_en": "China Bans Dual-Use Exports to Japan", "category": "关键矿产", "tags": ["出口管制", "中国", "日本", "军民两用", "稀土", "关键矿产", "再武装"], "pages": "5-9", "summary": "中东战火蔓延之际，中国禁止向日本出口军民两用物项以遏制其重新武装。报告分析稀土供应链与无人机/导弹生产的关联，指出没有中国许可，全球再武装周期无法发生。美国弹药消耗率急剧消耗宝贵库存，关键矿产持续供应成为战争持续能力的关键瓶颈。"}, {"id": "02", "title": "浪漫衰退：一代人的心理冲击与人际关系重估", "title_en": "The Romantic Recession: Mass Singleness and Dating App Fatigue", "category": "科技与社会", "tags": ["浪漫衰退", "孤独", "约会应用", "incels", "AI伴侣", "人口结构"], "pages": "10-14", "summary": "浪漫衰退正导致一代人经历严重心理冲击、对制度的深度不信任，以及人际关系的大规模重估。分析涵盖dating app疲劳、Stanford Date Drop现象、亲密关系的市场化、AI伴侣兴起，以及人口结构对孤独流行病的深远影响。"}, {"id": "03", "title": "战争是通胀性的：中东冲突与石油大宗商品飙升", "title_en": "War Is Inflationary: Middle East Conflict and Oil Surge", "category": "投资策略", "tags": ["战争", "通胀", "油价", "霍尔木兹海峡", "伊朗", "石油天然气", "大宗商品"], "pages": "15-22", "summary": "更广泛且持续的中东冲突可能引发下一轮石油和大宗商品飙升。过去一个世纪中最持久的通胀时期都发生在战时。13D石油和天然气指数年初至今已超越标普500指数30个百分点。分析涵盖霍尔木兹海峡风险、伊朗紧张局势、能源基础设施威胁及OPEC动态。"}, {"id": "04", "title": "存储芯片短缺加剧：AI基础设施需求与关键矿产风险", "title_en": "Memory Chip Shortage: AI Infrastructure Demand and Critical Mineral Risk", "category": "关键矿产", "tags": ["存储芯片", "HBM", "DRAM", "AI基础设施", "SK海力士", "三星", "美光"], "pages": "23-28", "summary": "受AI基础设施建设巨大需求推动，存储芯片（HBM/DRAM）短缺正在加剧。行业正打破历史周期性需求模式，关键矿产的新兴短缺对存储芯片生产构成战略风险。涉及SK海力士、三星电子、美光科技等主要厂商的定价权和产能分析。"}, {"id": "05", "title": "能源危机下的亚洲化工格局重塑：宝丰能源纳入13D投资组合", "title_en": "Asia's Chemical Industry Reshaping: Baofeng Energy Added to Portfolio", "category": "产业投资", "tags": ["能源危机", "化工", "韩国", "日本", "中国", "宝丰能源", "煤化工"], "pages": "29-33", "summary": "持续的能源危机可能迫使韩国和日本化工行业迁往中国。13D将中国领先煤化工企业宝丰能源纳入中国周期性机会与抗通缩投资组合。分析涵盖烯烃、石脑油裂解、中海油、神华能源等关键企业。"}, {"id": "06", "title": "培养有韧性的孩子：算法时代的教育挑战", "title_en": "Raising Resilient Children in the Age of Algorithms", "category": "思想与人文", "tags": ["韧性", "儿童教育", "过度刺激", "算法时代", "不适耐受", "代际"], "pages": "34-38", "summary": "我们面临的不是无用的一代，而是过度刺激、缺乏忍受不适能力的一代。在算法时代，培养有韧性孩子的秘诀在于重新审视童年体验的本质，包括面对风险、无聊和不便的能力。"}, {"id": "07", "title": "特朗普在伊朗问题上的史诗级误判？", "title_en": "Trump's Epic Miscalculation on Iran?", "category": "地缘政治", "tags": ["特朗普", "伊朗", "误判", "革命卫队", "马赛克学说", "殉道", "哈梅内伊"], "pages": "39-44", "summary": "特朗普政府是否在伊朗问题上犯下了史诗般的误判？他可能释放了自己无法控制的强大力量。分析涵盖革命卫队马赛克学说、什叶派殉道传统、两伊战争历史参照、哈梅内伊可能的殉道意图及吉哈德教令的发布，对投资前景可能产生重大影响。"}, {"id": "08", "title": "欧洲的关键瓶颈与经济杠杆：俄罗斯能源回归？", "title_en": "Europe's Critical Bottlenecks as Economic Leverage", "category": "地缘政治", "tags": ["欧洲", "经济杠杆", "贸易咽喉", "低浓缩铀", "燃气轮机", "俄罗斯", "天然气"], "pages": "45-48", "summary": "欧洲会利用其关键瓶颈获取经济杠杆吗？报告分析欧洲通过贸易咽喉要道重新确立地位的路径，包括低浓缩铀和燃气轮机领域的依赖关系，以及欧盟对俄罗斯天然气进口的潜在重启空间。"}, {"id": "09", "title": "美国西部131年来最热冬季：雪旱与水资源危机", "title_en": "Record Warm Winter: Snow Drought and Water Crisis in Western US", "category": "环境与健康", "tags": ["气候", "暖冬", "雪旱", "科罗拉多河", "野火", "拉尼娜", "水资源"], "pages": "49-53", "summary": "美国西部经历了131年来最热的冬季，雪旱将加剧水资源短缺并可能引发早期活跃的野火季节。消退的拉尼娜现象预计将增加强对流风暴、冰雹和山洪暴发，鲍威尔湖面临年底前达到死池状态的风险。"}, {"id": "10", "title": "户外活动对儿童大脑发育的系统性益处", "title_en": "Systematic Benefits of Outdoor Exposure for Children's Brain Development", "category": "环境与健康", "tags": ["户外活动", "儿童", "大脑发育", "自然缺失症", "韧性", "韩国治愈森林", "Udeskole"], "pages": "54-57", "summary": "最新研究从单纯承认自然的积极影响转向分析其系统性和心理机制的运作方式。涵盖自然缺失症、冒险性游戏与韧性培养，以及全球案例：韩国治愈森林、丹麦Udeskole户外学校、旧金山儿童与自然倡议。"}, {"id": "11", "title": "伊朗战争数字：简单纯粹的数学对美国不利", "title_en": "Iran War Math: The Numbers Don't Add Up for America", "category": "地缘政治", "tags": ["伊朗战争", "导弹防御", "斩首打击", "BMD拦截器", "精确弹药", "无人机", "关键矿产", "僵局"], "pages": "58-63", "summary": "伊朗战争数字对美国来说不合算：导弹防御数学分析、六月战争教训、斩首打击与伊朗报复、BMD拦截器短缺、精确弹药消耗、无人机成本比较、关键矿产依赖。分析三线同时作战框架、僵局和地面入侵情景。"}], "has_full": true}, {"report_id": "WILTW-2026-03-12", "date": "2026-03-12", "title": "What I Learned This Week", "publisher": "13D Research & Strategy", "total_pages": 59, "sections": [{"id": "00", "title": "策略、资产配置与高信念投资组合表现", "title_en": "Strategy, Asset Allocation & High-Conviction Portfolio Performance", "category": "投资策略", "tags": ["资产配置", "大宗商品", "黄金", "白银", "中国股票", "硬资产", "通胀", "债券熊市"], "pages": "3-4", "summary": "13D高信念组合持续跑赢。2020年10月以来持续论证经典市场范式转变：大宗商品、硬资产将引领新周期。黄金/CPI比突破45年下行趋势线，中国股市处于长期牛市初期，美元进入长期下行趋势，白银开始跑赢黄金，农业大宗商品启动突破。"}, {"id": "01", "title": "伊朗冲突与美国军事选项的局限性", "title_en": "Iran Conflict & Limitations of US Military Options", "category": "地缘政治", "tags": ["伊朗", "美国军事", "中东", "地缘博弈", "伊斯兰革命卫队"], "pages": "5-11", "summary": "美国对伊朗军事行动面临严重局限。伊朗报复能力远超预期，弹道导弹精确打击显示其军事实力被低估。美国在中东的防空系统、雷达设施遭摧毁，THAAD系统从朝鲜半岛重新部署。战略矿产短缺制约弹药补充，AN/FPS-132雷达重建需至少8年、3倍成本。"}, {"id": "02", "title": "关键矿产与西方国防供应链危机", "title_en": "Critical Minerals & Western Defense Supply Chain Crisis", "category": "关键矿产", "tags": ["关键矿产", "国防供应链", "稀土", "镓", "锗", "锑", "中国出口管制", "应急产能"], "pages": "12-15", "summary": "美国国防部84%供应链含中国供应商。\"应急产能\"（surge capacity）与\"非应急产能\"区分关键：前者可快速扩展，后者需多年制度性建设。中国稀土产业链拥有73个企业研发中心、5个国家重点实验室、90%离心萃取器专利。镓（F-35战斗机必需）、钐（AN/FPS-132雷达必需）等矿产的不对称定价即将爆发。13D关键矿产指数自2025年2月推出以来+362.8%。"}, {"id": "03", "title": "油价冲击、滞胀风险与美联储困境", "title_en": "Oil Price Shock, Stagflation Risk & the Fed's Hobson's Choice", "category": "投资策略", "tags": ["油价", "滞胀", "美联储", "通胀", "美国国债", "大宗商品", "K型经济"], "pages": "16-23", "summary": "伊朗入侵后油价飙升，6月降息概率从62%暴跌至30%以下。经典滞胀背景成型：10Y/30Y美债收益率均升25bp+，彭博全球综合债券指数回吐全年涨幅。大宗商品相对美债实现突破。美国2月减少92,000工作岗位，K型经济加剧分化。联邦净利息支出未来10年增长121%至2.1万亿美元。条条大路通黄金。"}, {"id": "04", "title": "伊朗新最高领袖莫杰塔巴·哈梅内伊——停火为何不太可能", "title_en": "Iran's New Supreme Leader Mojtaba Khamenei — Why a Ceasefire Is Unlikely", "category": "地缘政治", "tags": ["伊朗", "莫杰塔巴·哈梅内伊", "最高领袖", "停火", "IRGC", "心理分析"], "pages": "24-28", "summary": "莫杰塔巴·哈梅内伊继任最高领袖，其父、母、妻、姐妹等直系亲属全在美国打击中丧生。两伊战争前线经历塑造其与IRGC的深厚纽带，师从最强硬神职人员梅斯巴-亚兹迪。历史类比：1980年伊拉克入侵反而巩固了霍梅尼政权。俄中立场使伊朗有恃无恐。短期停火极不可能。"}, {"id": "05", "title": "真实的\"被看见\"——人际关系的心理与生理力量", "title_en": "The Power of Being Seen — Psychology & Physiology of Human Connection", "category": "思想与人文", "tags": ["被看见", "人际关系", "心理学", "fMRI", "哈佛研究", "认可", "社交健康"], "pages": "29-32", "summary": "\"被看见\"（being seen）激活前额叶皮层和岛叶，降低压力激素、减轻炎症、改善心率变异性。哈佛成人发展研究88年追踪表明：亲密关系质量是幸福和健康的最强预测因子。阿克塞尔·霍耐特认为认可是社会生活的道德基础。真实认可带来自我验证、身份连贯性增加、道德发展加深。"}, {"id": "06", "title": "伊朗冲突对全球化肥与食品价格的影响", "title_en": "Iran Conflict Impact on Global Fertilizer & Food Prices", "category": "产业投资", "tags": ["化肥", "食品价格", "霍尔木兹海峡", "尿素", "氮肥", "粮食安全", "CF Industries"], "pages": "33-35", "summary": "霍尔木兹海峡承载全球三分之一LNG贸易和大量化肥运输。伊朗冲突已冲击全球尿素供应：CF Industries股价+18%。氮肥生产成本因天然气价格上涨而飙升。脆弱国家（尼日利亚、巴基斯坦、土耳其、印度、肯尼亚、埃塞俄比亚）面临最大风险。全球粮食系统对化肥进口的依赖构成系统性脆弱性。"}, {"id": "07", "title": "全球粮食安全：极端天气与地缘冲突的双重冲击", "title_en": "Global Food Security: Dual Shock of Extreme Weather & Geopolitical Conflict", "category": "产业投资", "tags": ["粮食安全", "极端天气", "13D粮食指数", "化肥依赖", "水资源短缺"], "pages": "36-37", "summary": "美国西部最热冬季加剧水资源短缺，西班牙/葡萄牙/法国/摩洛哥洪水摧毁冬季果蔬。13D粮食安全指数YTD +19.03% vs 标普500 -0.5%。德克萨斯大学帕特尔警告：长期方案不是依赖必须通过霍尔木兹海峡运输的化肥。武装冲突与极端天气叠加加剧全球粮食危机风险。"}, {"id": "08", "title": "后识字时代危机：如何培养热爱阅读的青少年", "title_en": "Surviving the Post-Literacy Era: Raising Teens Who Love to Read", "category": "科技与社会", "tags": ["后识字时代", "阅读", "青少年", "教育", "NCLB", "Common Core", "文化价值观"], "pages": "37-40", "summary": "1976年40%高中生为乐趣阅读6本以上，2022年仅13%。乔治城大学英语系主任称学生连14行十四行诗都读不完。NCLB法案和Common Core标准将教学重心从文学转向\"信息文本\"，系统性削弱深度阅读能力。文化的价值观转变：从深度阅读转向碎片化信息消费。"}, {"id": "09", "title": "霍尔木兹海峡军事分析：伊朗的四种反制手段", "title_en": "Hormuz Strait Military Analysis: Iran's Four Countermeasures", "category": "地缘政治", "tags": ["霍尔木兹海峡", "伊朗军事", "弹道导弹", "无人机", "反舰巡航导弹", "水雷", "美军"], "pages": "40-43", "summary": "伊朗四种海峡反制手段：(1)弹道导弹——数百枚隐蔽发射点；(2)无人机群——数百架可同时发射；(3)反舰巡航导弹——对油轮致命；(4)水雷——最后手段，数千枚可从小船布设。美军扫雷能力有限，海湾战争时12艘扫雷舰花2个多月清除水雷。完全打开海峡需地面控制南部海岸线，需约500,000美军。"}, {"id": "10", "title": "霍尔木兹海峡关闭对中国的影响", "title_en": "Impact of Hormuz Strait Closure on China", "category": "中国宏观经济", "tags": ["中国", "霍尔木兹海峡", "石油战略储备", "俄罗斯", "天然气", "西伯利亚力量"], "pages": "43-45", "summary": "中国约40%石油进口经霍尔木兹海峡。战略石油储备约90天，但实际可用量受限于炼厂配置。俄罗斯替代供应有限：西伯利亚力量管道运力远低于海峡替代需求。中国可通过增加俄罗斯管道天然气和煤炭进口部分缓解，但成本显著上升。海峡关闭将严重冲击中国经济。"}, {"id": "11", "title": "超级老人研究：神经新生与长寿的神经科学", "title_en": "SuperAgers: Neurogenesis & the Neuroscience of Longevity", "category": "环境与健康", "tags": ["超级老人", "神经新生", "海马体", "APOE", "神经可塑性", "社交关系", "长寿"], "pages": "45-48", "summary": "超级老人（80+岁认知能力相当于50岁）研究揭示：海马体齿状回持续神经新生，APOE基因变异影响风险。神经可塑性可通过学习新技能、社交接触维持。报名学习课程即可提升大脑表现，短暂社交接触也有可量化益处。哈佛88年研究：人际关系强度是长寿健康生活的首要预测因子。5-3-1法则：5次每周连接、3段核心纽带、1小时日常互动。"}, {"id": "12", "title": "AfD在巴登-符腾堡州选举结果：对德国和欧盟的警钟", "title_en": "AfD Election Results in Baden-Württemberg: A Wake-Up Call for Germany & EU", "category": "地缘政治", "tags": ["德国", "AfD", "选举", "巴登-符腾堡", "欧盟", "能源危机", "经济分化"], "pages": "49-51", "summary": "AfD在巴登-符腾堡州得票率翻倍，CDU支持率下滑。AfD传统上在东部（人均GDP仅西部66%）表现最强，此次在富裕的西南部突破意义重大。能源成本差异加剧政治分裂：东部家庭按购买力调整后能源费用比西部高近四分之一。"}, {"id": "13", "title": "中东危机对欧洲能源市场的影响", "title_en": "Middle East Crisis Impact on European Energy Markets", "category": "地缘政治", "tags": ["欧洲能源", "LNG", "天然气", "俄罗斯", "霍尔木兹海峡", "德国经济", "去工业化"], "pages": "51-57", "summary": "全球LNG工厂满负荷运转，欧洲天然气储存处于低位。2022年欧洲能源补贴近4万亿欧元，无法再来一次。德国天然气价格为美国6倍。波罗的海LNG指数周内飙升543%。俄罗斯仍占欧洲LNG进口12%。普京称欧洲付美国LNG价格是俄罗斯管道气3-4倍。油价每上涨10美元，德国GDP面临0.2%下行风险。"}], "has_full": true}, {"report_id": "WILTW-2026-03-19", "date": "2026-03-19", "title": "What I Learned This Week", "publisher": "13D Research & Strategy", "total_pages": 57, "sections": [{"id": "00", "title": "策略与资产配置及高信念想法表现", "title_en": "Strategy & Asset Allocation & Performance of High Conviction Ideas", "category": "投资策略", "tags": ["资产配置", "高信念想法", "投资组合", "表现回顾"], "pages": "3-4", "summary": "回顾13D高信念投资想法的近期表现与策略布局。在市场因伊朗局势剧烈波动的背景下，评估各资产类别和关键主题的配置逻辑，为后续各章节的具体分析奠定框架。"}, {"id": "01", "title": "什么会促使伊朗重新开放霍尔木兹海峡？", "title_en": "What Would Make Iran Reopen the Straits of Hormuz?", "category": "地缘政治", "tags": ["伊朗", "霍尔木兹海峡", "地缘政治", "能源安全", "中东"], "pages": "5-7", "summary": "深入分析伊朗封锁霍尔木兹海峡的战略动机与可能的让步条件。探讨国际压力、军事打击风险、内部经济困境等因素如何影响伊朗的决策，以及各方在谈判中的底线与筹码。"}, {"id": "02", "title": "伊朗战争是否成为全球石油市场的重大转折点？", "title_en": "Will the Iran War Mark a Major Inflection Point in the Global Oil Market?", "category": "投资策略", "tags": ["石油", "伊朗战争", "供应脆弱性", "独立石油生产商", "自由现金流", "能源转型"], "pages": "8-14", "summary": "对比1973、1979和2004年的历史转折点，论证当前伊朗战争可能再次重塑全球石油市场格局。提出逆向观点：全球石油供应脆弱性将持续多年，独立石油生产商有望产生巨额自由现金流。分析IEA自然递减率、上游投资不足、美国页岩油盈亏平衡价等关键数据。"}, {"id": "03", "title": "铝是否会成为下一个铜？（续）", "title_en": "Is Aluminum the Next Copper (Continued)?", "category": "关键矿产", "tags": ["铝", "冶炼", "中国", "能源危机", "Alba", "Qatalum", "云铝股份", "中国铝业"], "pages": "15-18", "summary": "能源危机持续推动铝冶炼产能向中国集中。中东Alba因天然气短缺宣布不可抗力，Qatalum减产加剧全球供应紧张。重申对中国铝冶炼龙头（云铝股份、中国铝业、神火股份、中国宏桥）的买入建议，分析估值与增长前景。"}, {"id": "04", "title": "钨——'战争金属'的严重结构性供应短缺", "title_en": "Tungsten — The 'War Metal' Entering Severe Structural Supply Deficit", "category": "关键矿产", "tags": ["钨", "战争金属", "关键国防矿产", "中国出口管制", "美国国防", "Almonty", "厦门钨业"], "pages": "19-24", "summary": "钨市场正进入严重结构性供应短缺，中国控制全球79%产量并实施出口限制。美国国防供应链面临深度脆弱性，APT价格飙升。分析13D关键矿产指数成分股（厦门钨业、Almonty Industries、EQ Resources），评估投资机会。"}, {"id": "05", "title": "全球防空和导弹防御短缺揭示美国优先事项", "title_en": "Global Air and Missile Defense Shortages Reveal U.S. Priorities", "category": "地缘政治", "tags": ["防空", "导弹防御", "美国军事", "伊朗冲突", "THAAD", "军事优先次序"], "pages": "24-27", "summary": "伊朗冲突暴露全球防空反导系统的严重短缺。分析美国在多个战线同时应对的军事资源紧张状态，防空拦截弹库存消耗速度远超补充能力。评估军事工业基础的瓶颈与投资含义。"}, {"id": "06", "title": "网络安全：逆向买入机会", "title_en": "Cybersecurity: A Contrary Buy Opportunity", "category": "科技与社会", "tags": ["网络安全", "伊朗网络战", "关键基础设施", "CACI", "SentinelOne", "AI网络战", "逆向投资"], "pages": "27-31", "summary": "美国关键基础设施面临伊朗全面网络战的严峻威胁，但网络安全股票以折价估值交易。分析伊朗网络攻击能力、供应链网络漏洞、AI驱动的网络战升级趋势。13D国防指数新增CACI International和SentinelOne，评估逆向买入逻辑。"}, {"id": "07", "title": "采矿设备：新兴金属矿产热潮中最被忽视的投资机会", "title_en": "Mining Equipment: The Most Overlooked Investment Opportunity in the Metals Boom", "category": "产业投资", "tags": ["采矿设备", "矿业资本支出", "售后市场", "电气化", "自动化", "卡特彼勒", "小松", "徐工"], "pages": "31-38", "summary": "全球矿业资本支出加速扩张，采矿设备行业正从传统的'镐和铲'向高利润、软件赋能、经常性收入平台转型。分析矿业车队老化带来的售后维修/维护市场巨大机遇。关注卡特彼勒、小松、山特维克、徐工集团等关键企业。"}, {"id": "08", "title": "霍尔木兹海峡封锁使可再生能源的理由无可辩驳", "title_en": "Closure of the Strait of Hormuz Makes the Case for Renewable Energy Undeniable", "category": "投资策略", "tags": ["可再生能源", "LNG", "能源安全", "电力价格", "欧盟", "IEEFA", "边际定价"], "pages": "38-43", "summary": "霍尔木兹海峡封锁对LNG价格产生的连锁冲击，揭示可再生能源在金融和能源安全方面的战略优势。分析欧盟及亚洲国家能源价格飙升的应对措施，IEEFA数据显示稳定低成本清洁能源的长期竞争力不可逆转。"}, {"id": "09", "title": "同情心：人类繁荣的生物必需", "title_en": "Compassion: A Biological Necessity for Human Flourishing", "category": "思想与人文", "tags": ["神经科学", "同情心", "CTO", "CTS", "心理健康", "转化精神病学"], "pages": "43-45", "summary": "神经科学研究揭示惊人真相：同情心不仅是道德美德，更是人类繁荣的生物必需。分析CTO（对他人的同情心）vs CTS（对自我的同情心）的神经机制差异，及《转化精神病学》发表的纵向研究数据。"}, {"id": "10", "title": "现代育儿方式是否让青春期变得更难？", "title_en": "Is Modern Parenting Making Adolescence Harder?", "category": "思想与人文", "tags": ["育儿", "青少年心理健康", "宽容式育儿", "屏幕时间", "盖洛普", "家庭研究所"], "pages": "45-52", "summary": "盖洛普/乔纳森·罗斯韦尔研究发现，父母要求度较高的家庭教育出的青少年抑郁率显著更低。对比宽容式育儿与严格育儿对心理健康结果的影响差异，探讨屏幕时间限制、家庭结构等关键变量。家庭研究所（IFS）调查数据补充分析。"}, {"id": "11", "title": "手工艺的价值：创造即存在", "title_en": "The Value of Craftsmanship: Creation as Existence", "category": "思想与人文", "tags": ["手工艺", "心流", "创造力", "行为药物", "神经科学", "数字饱和", "彼得·科恩", "荣格"], "pages": "52-55", "summary": "彼得·科恩《我们为什么制作东西》与米哈里·契克森米哈赖'心流'概念，揭示手工艺对心理健康的深刻价值。凯利·兰伯特博士'行为药物'（behaviorceuticals）神经科学研究表明努力驱动奖赏回路可对抗习得性无助。全球'数字饱和'文化修正趋势下，手工艺复兴成为精神解药。"}], "has_full": true}, {"report_id": "WILTW-2026-03-26", "date": "2026-03-26", "title": "What I Learned This Week", "publisher": "13D Research & Strategy", "total_pages": 59, "sections": [{"id": "00", "title": "策略与资产配置及高确信度投资组合表现", "title_en": "Strategy & Asset Allocation & Performance of High Conviction Ideas", "category": "投资策略", "tags": ["资产配置", "高确信度投资组合", "黄金", "白银", "资源矿业"], "pages": "3-4", "summary": "过去一周13D高确信度投资组合下跌0.9%，但年初至今已上涨12.4%。主要拖累因素包括黄金实物、关键矿产指数、白银指数和中国周期性机会指数。投资组合继续集中配置于资源矿业股，它们将成为市场体制转变中的潜在赢家。西方投资者最大的问题是中国是否可投资——13D认为这正是逆向投资的好时机。"}, {"id": "01", "title": "伊朗的战略：在经济领域而非军事领域作战", "title_en": "Iran's Strategy: Fight in the Economic Domain, Not Military", "category": "地缘政治", "tags": ["伊朗", "美国", "以色列", "美债收益率", "石油", "霍尔木兹海峡", "PCE", "PPI"], "pages": "5-10", "summary": "伊朗政权历经20余年打磨的战略是不惜一切代价求存、争取时间，在经济领域而非军事领域展开战争。美国/以色列的记分卡聚焦于消灭高层领导人、摧毁舰船和战斗机，但伊朗的记分卡截然不同：美国10年期国债收益率自战争以来上升40个基点，核心PCE和PPI均超3%且在上升，俄罗斯和中国向德黑兰提供情报支持。越来越多国家通过霍尔木兹海峡运输的石油收取过境费。日元贬值至159.5，日本作为能源净进口国可能被迫减持美国资产。"}, {"id": "02", "title": "黄金的低点是否已经确立？滞胀与美联储困境", "title_en": "Has the Low in Gold Been Registered? Stagflation & Fed Predicament", "category": "贵金属", "tags": ["黄金", "白银", "美联储", "滞胀", "矿业股", "降息", "收益率曲线"], "pages": "11-18", "summary": "从看空情绪极端值和历次回调的历史来看，黄金的低点可能已经确立。第四季度GDP增速被下修，滞胀持续展开。1973年OPEC石油禁运期间黄金回调29%后反弹至新高，当前模式类似。美联储若现在收紧政策最终可能被视为史上最大错误，堪比2008年8月未放松政策和2021年通胀飙升时未收紧。加息对联邦预算和美元将是灾难。高确信度投资组合继续集中配置于资源矿业股。"}, {"id": "03", "title": "伊朗战争：之后会发生什么？", "title_en": "Iran War: What Happens After?", "category": "地缘政治", "tags": ["伊朗战争", "哈梅内伊", "地面战争", "石油基建", "中东"], "pages": "19-22", "summary": "分析伊朗战争可能的发展走向。哈梅内伊遇刺被视为重大事件，可能引发连锁反应。如果升级为地面战争将产生深远影响。重启石油流通并不像打开开关那么简单——油田基础设施遭受的破坏需要大量时间和资金修复。讨论了冲突后伊朗局势的各种可能情景。"}, {"id": "04", "title": "观世音菩萨与慈悲的神经科学：何种心智能承载众生苦难？", "title_en": "Avalokiteshvara & Neuroscience of Compassion", "category": "思想与人文", "tags": ["观世音菩萨", "慈悲", "神经科学", "共情困扰", "冥想", "心智训练"], "pages": "23-24", "summary": "探讨观世音菩萨'碎裂'意象的深层含义——何种心智能对他人苦难保持开放而不被重压所击垮？引用Tania Singer的ReSource项目研究，指出共情困扰与慈悲训练的对比。慈悲将因共情而不知所措的状态转化为参与和投入，正如观世音菩萨每一只眼睛代表一种不同的帮助方式、一种不同的感知方式。慈悲训练可降低皮质醇水平、提高心率变异性，表明情绪调节能力的改善。"}, {"id": "05", "title": "中国可再生能源：当前能源危机的关键受益者", "title_en": "China's Renewable Energy: Key Beneficiary of the Energy Crisis", "category": "中国宏观经济", "tags": ["可再生能源", "中国", "电动汽车", "油价", "阳光电源", "东方电气", "赣锋锂业", "宁德时代", "比亚迪"], "pages": "25-29", "summary": "中国可再生能源行业是当前能源危机的关键受益者。油价与电动汽车采用率之间存在正相关关系，油价上涨推动消费者转向电动车。中证能源指数与新能源指数的相关性分析证实了这一传导机制。重申对13D周期性机会与抗通缩指数中最青睐的可再生能源股的买入建议，包括阳光电源、东方电气、赣锋锂业、青海盐湖、宁德时代、比亚迪、通威股份等。"}, {"id": "06", "title": "矿业板块回调：长期买入机会", "title_en": "Mining Pullback: Compelling Long-Term Buying Opportunity", "category": "关键矿产", "tags": ["矿业", "关键矿产", "国防矿产", "钨", "锑", "铼", "铪", "弹药", "莱茵金属"], "pages": "30-35", "summary": "本月以来矿业板块的急剧回调为这个完美定位于获取超额未来回报的行业提供了极具吸引力的长期买入机会。伊朗冲突中的导弹消耗正导致全球钨供应链紧张。战争对小型金属市场造成特别压力。13D关键矿产指数自成立以来持续跑赢。国防矿产（钨、锑、铼、铪）供应短缺因全球重新武装周期而加剧，莱茵金属弹药生产扩张是典型例证。"}, {"id": "07", "title": "破纪录三月热浪：气候变化加速的信号", "title_en": "Record-Shattering March Heatwaves: Accelerating Climate Change", "category": "环境与健康", "tags": ["热浪", "气候变化", "北极变暖", "急流", "干旱", "野火", "水资源", "劳动生产力"], "pages": "36-41", "summary": "春天已变成夏天，破纪录的三月热浪炙烤着美国、欧洲和亚洲大部分地区。异常急流行为与北极快速变暖有关。近半数美国人口（约1.3亿人）受干旱影响。南亚和东南亚高达20亿人受到极端高温影响。印度尼西亚、马来西亚、越南和菲律宾也出现创纪录高温。预计北半球大部分地区夏季将比正常更炎热。高温的经济成本包括劳动生产力损失和基础设施压力。"}, {"id": "08", "title": "美国生物恐怖主义脆弱性与防御投资机会", "title_en": "U.S. Bioterrorism Vulnerability & Defense Investment", "category": "环境与健康", "tags": ["生物恐怖主义", "伊朗", "炭疽", "生物防御", "公共卫生", "化学-生物"], "pages": "42-46", "summary": "随着伊朗或其他对手发动不对称攻击的风险上升，美国极易遭受生物恐怖主义威胁。2001年炭疽攻击仅涉及少量含炭疽杆菌的信件，但造成了巨大的社会心理和经济冲击。缺陷包括生物情报和早期预警不足、室内空气过滤不充分等。13D公共卫生指数、13D国防指数和特定化学-生物防御公司是投资生物防御的关键标的。"}, {"id": "09", "title": "欧洲战略自主与资本流动：最让投资者意外的方向", "title_en": "European Strategic Autonomy & Capital Flows", "category": "投资策略", "tags": ["欧洲", "战略自主", "AI", "风险投资", "资本市场一体化", "Prosus"], "pages": "47-50", "summary": "当所有目光聚焦于中东战争及能源危机时，欧洲正发生可能令投资者最感意外的变化。德国、法国、意大利、西班牙、荷兰等国财政部长推动资本市场一体化。Prosus与Dealroom关于欧洲AI的报告显示该领域融资环境正在改善。欧盟资本市场联盟的推进可能改变全球资本流动格局。"}, {"id": "10", "title": "印度石油天然气危机助推生物燃料产业扩张", "title_en": "India's Oil & Gas Crisis Boosts Biofuels Industry", "category": "产业投资", "tags": ["印度", "生物燃料", "乙醇", "压缩沼气", "SAF", "Praj Industries", "Balrampur Chini"], "pages": "51-54", "summary": "中东冲突引发的印度当前石油和天然气危机对该国不断扩大的生物燃料行业是重大利好。印度2024-25财年原油进口支出约1370亿美元。乙醇掺混计划自2014-15年以来已节省超155亿美元。压缩沼气正成为印度生物能源的第二战场。可持续航空燃料（SAF）前景广阔。国内生物能源价值链公司（Praj Industries、Balrampur Chini Mills、Triveni Engineering）将大幅扩张。"}, {"id": "11", "title": "世界传说：叙事如何塑造儿童的认知架构", "title_en": "World Fables: How Narrative Shapes Children's Cognitive Architecture", "category": "思想与人文", "tags": ["叙事", "认知发展", "儿童教育", "Erik Hoel", "神经科学", "故事"], "pages": "55-57", "summary": "早在儿童能阅读教科书之前，他们已经在构建世界模型。父母讲述的故事就是这个模型的建筑架构。Erik Hoel关于'世界传说'的讨论融合了古典历史，展示了叙事脚手架如何从根本上塑造认知发展。成为父母意味着需要重新向孩子解释世界——故事是这一过程的核心建筑工具。"}], "has_full": true}, {"report_id": "WILTW-2026-04-02", "date": "2026-04-02", "title": "What I Learned This Week", "publisher": "13D Research & Strategy", "total_pages": 62, "sections": [{"id": "00", "title": "策略与资产配置及高确信度理念表现", "title_en": "Strategy & Asset Allocation & Performance of High Conviction Ideas", "category": "投资策略", "tags": ["资产配置", "大宗商品", "通胀", "HCI投资组合"], "pages": "3-4", "summary": "自2020年9月以来，13D持续主张大宗商品及通胀敏感型资产将成为新市场领导者。本节展示HCI投资组合配置及周度/年初至今业绩数据，验证范式转换的持续性。"}, {"id": "01", "title": "发行人信函：滞胀风险与投资组合调整", "title_en": "Publisher's Letter: Stagflation Risk & Portfolio Adjustments", "category": "投资策略", "tags": ["滞胀", "通胀", "供应链", "AI股票", "能源供给", "Mag-7"], "pages": "5-16", "summary": "发行人指出50年来最大的滞胀风险正在形成。HCI投资组合已调整，剔除受AI股票疲软和能源供应中断影响的持仓。实体经济供应脆弱性与数十年依赖金融化推动增长之间的张力达到临界点。涵盖十大关键趋势、Mag-7分析、硬资产转型、布克斯塔伯论金融体系脆弱性、主权债务与伊朗战争冲击。"}, {"id": "02", "title": "市场展望：史上最大石油危机", "title_en": "Market Outlook: The Greatest Oil Crisis in History", "category": "投资策略", "tags": ["石油危机", "防御配置", "黄金", "矿企", "Mag-7"], "pages": "17-20", "summary": "市场可能很快面临所谓'史上最大石油危机'。防御性配置是必要的，但也存在卓越机会。Mag-7走弱、标普500疲软与黄金及金矿股走强可能是未来走势的先兆。"}, {"id": "03", "title": "黄金与金矿股", "title_en": "Gold and Gold Miners", "category": "贵金属", "tags": ["黄金", "金矿股", "AISC", "历史类比"], "pages": "21", "summary": "黄金和金矿股表现强劲，类比1973年、1978-79年、2000年、2007-09年牛市结构。分析全部维持成本（AISC）利润率和估值水平，金矿股自由现金流创历史新高。"}, {"id": "04", "title": "石油与天然气", "title_en": "Oil and Gas", "category": "关键矿产", "tags": ["石油", "天然气", "供应脆弱性", "IEA", "油田衰减率"], "pages": "22", "summary": "油气板块第一季度表现强劲。供应脆弱性理论得到IEA油田衰减率数据的支持——全球常规油田年均衰减率约8%，新发现不足以弥补枯竭。"}, {"id": "05", "title": "关键矿产", "title_en": "Critical Minerals", "category": "关键矿产", "tags": ["关键矿产", "钨", "中国主导", "矿业估值", "伊朗战争", "供应链"], "pages": "23-26", "summary": "关键矿产指数表现、中国治下的和平（Pax Sinica）分析、中国在矿产加工领域的主导地位。小金属系列聚焦钨。分析中游脆弱性、采矿业'斯普特尼克时刻'，以及伊朗战争对关键矿产消耗率的影响。"}, {"id": "06", "title": "人之为人：音乐、韧性、善良与心理健康", "title_en": "What Makes Us Human: Music, Resilience, Kindness & Mental Health", "category": "思想与人文", "tags": ["音乐", "韧性", "善良", "青少年心理健康", "大学关闭", "社会处方", "阅读危机", "浪漫衰退"], "pages": "27-37", "summary": "音乐与人性韧性的关系、善良与感恩的生物学基础、青少年心理健康危机与道德基础缺失、父母焦虑、大学关闭潮。社会处方趋势（医生开具艺术/自然/志愿活动处方）。后读写时代的阅读危机与拼读教学回归。人际关系变迁、浪漫衰退、超级老年人的生物学标志与同情神经科学。"}, {"id": "07", "title": "地缘政治", "title_en": "Geopolitics", "category": "地缘政治", "tags": ["伊朗战争", "霍尔木兹海峡", "委内瑞拉", "国际法", "大国竞争", "人民币", "乌克兰"], "pages": "38-44", "summary": "伊朗战争全面分析（回顾2025年2月至2026年3月系列文章）。霍尔木兹海峡战略困境。委内瑞拉马杜罗抓捕行动、国际法崩溃、'强权'取代'法治'。美中地缘经济竞争：伊朗制裁关税真实目标、人民币作为大宗商品储备货币前景、中加关系。乌克兰持续僵局。"}, {"id": "08", "title": "铀", "title_en": "Uranium", "category": "关键矿产", "tags": ["铀", "核能", "供应缺口", "铀矿指数"], "pages": "45", "summary": "13D铀矿指数2026年Q1上涨16.2%。结构性供应缺口持续扩大，长期合同签约率上升。价格展望每磅125美元以上。"}, {"id": "09", "title": "白银与白银矿业股", "title_en": "Silver and Silver Miners", "category": "贵金属", "tags": ["白银", "工业需求", "结构性缺口"], "pages": "44", "summary": "白银连续第五年出现结构性供需缺口。工业需求激增（太阳能、电子、军事），叠加投资需求，推动白银价格和矿业股表现强劲。"}, {"id": "10", "title": "铜与铜矿业股", "title_en": "Copper and Copper Miners", "category": "关键矿产", "tags": ["铜", "供应峰值", "BMO", "成本分析"], "pages": "45", "summary": "标普全球报告预测铜矿供应于2030年达到峰值。BMO成本分析显示行业成本曲线陡峭化。供需缺口扩大支撑铜价长期牛市。"}, {"id": "11", "title": "中国", "title_en": "China", "category": "中国宏观经济", "tags": ["中国股市", "通胀", "能源板块", "国债", "消费"], "pages": "46", "summary": "13D中国周期性机遇与抗通缩指数涨幅超50%。能源板块突破趋势线。分析上下游通胀分化、中国国债走势及消费板块前景。"}, {"id": "12", "title": "电网基础设施", "title_en": "Grid Infrastructure", "category": "产业投资", "tags": ["电网", "变压器", "数据中心", "数字化"], "pages": "47", "summary": "13D电网基础设施指数表现强劲。变压器短缺危机持续，数据中心电力需求激增，电网数字化投资加速。全球电网投资预计2030年突破6000亿美元。"}, {"id": "13", "title": "粮食安全", "title_en": "Food Security", "category": "产业投资", "tags": ["粮食安全", "化肥", "厄尔尼诺", "霍尔木兹海峡"], "pages": "48-49", "summary": "13D粮食安全指数分析。霍尔木兹海峡中断对全球粮食供应链的影响。化肥板块受能源成本传导走强。超级厄尔尼诺风险预警及对农业生产的影响。"}, {"id": "14", "title": "国防", "title_en": "Defense", "category": "地缘政治", "tags": ["国防", "军费", "武器短缺", "伊朗战争"], "pages": "50", "summary": "全球军费开支创历史新高。美国/伊朗冲突消耗弹药库存速度惊人，暴露西方国家武器产能不足的深层问题。"}, {"id": "15", "title": "欧洲", "title_en": "Europe", "category": "地缘政治", "tags": ["欧洲", "资本流动", "风投", "AI"], "pages": "50-51", "summary": "欧洲资本流动趋势分析。风投市场蓬勃发展，AI领域优势凸显。战略自主政策推动国防和能源投资。"}, {"id": "16", "title": "气候变化与厄尔尼诺", "title_en": "Climate Change and El Niño", "category": "环境与健康", "tags": ["气候变化", "厄尔尼诺", "创纪录高温", "能源失衡"], "pages": "52-53", "summary": "全球气温连续创纪录。地球能量失衡加剧，灾难成本飙升。超级厄尔尼诺预测：2026-2027年可能成为有记录以来最暖年份之一，对农业和能源市场影响深远。"}, {"id": "17", "title": "颠覆与创新", "title_en": "Disruption and Innovation", "category": "科技与社会", "tags": ["AI", "人形机器人", "DeepSeek", "GPT-5.4", "Claude Opus 4.6", "6G"], "pages": "54-59", "summary": "AI与人形机器人最新进展。DeepSeek、GPT-5.4、Claude Opus 4.6模型对比。中国AI扩张加速。清洁能源：可再生能源首次超越煤电。下一代无线通信6G竞赛，中国卫星/6G进展领先。长寿生物科技与癌症治疗突破、超级老年人研究。"}, {"id": "18", "title": "水资源", "title_en": "Water", "category": "环境与健康", "tags": ["水资源", "海水淡化", "水战争", "水破产"], "pages": "60-62", "summary": "全球水资源破产危机加剧。海水淡化技术进展和成本下降。水战争风险上升：跨境河流争端、地下水枯竭、城市供水危机。投资机会涵盖水处理、管道基础设施和智能水管理。"}], "has_full": true}, {"report_id": "WILTW-2026-04-09", "date": "2026-04-09", "title": "What I Learned This Week", "publisher": "13D Research & Strategy", "total_pages": 60, "sections": [{"id": "00", "title": "策略与资产配置及高确信度观点的表现", "title_en": "Strategy & Asset Allocation + High Conviction Performance", "category": "投资策略", "tags": ["资产配置", "范式转变", "大宗商品", "黄金", "中国股市", "债券熊市"], "pages": "3-4", "summary": "13D 重申自2020年以来的核心观点：全球市场正经历向大宗商品、通胀敏感板块及长期低迷市场的范式转变。黄金/CPI比率已突破45年下降趋势线，债券40年牛市已转入长期熊市。中国股市正处于长期牛市早期阶段，西方投资者'中国不可投资'的叙事恰恰是逆向信号。"}, {"id": "01", "title": "二阶后果的诅咒：霍尔木兹海峡与伊朗地缘战略", "title_en": "The Curse of Second-Order Effects: Strait of Hormuz in Iran's Strategic Calculus", "category": "地缘政治", "tags": ["霍尔木兹海峡", "伊朗", "石油供应", "地缘战略", "二阶后果"], "pages": "5-9", "summary": "华盛顿误判伊朗将霍尔木兹海峡作为战术谈判工具，实际上伊朗视其为战后地区架构中的战略杠杆。六周战争提升了海峡的重要性，伊朗意图利用海峡控制权增强其在战后中东的相对实力。分析石油供应中断风险及投资影响。"}, {"id": "02", "title": "解放日一年后：关税、债务与黄金回调", "title_en": "One Year After Liberation Day: Tariffs, Debt, and the Gold Pullback", "category": "投资策略", "tags": ["关税", "贸易政策", "联邦赤字", "通胀", "黄金", "GDP增长"], "pages": "9-18", "summary": "解放日关税实施一年后，关税成本、贸易政策不确定性与供应链中断正在削弱美国偿债能力。GDP增长放缓将压制税收收入，通胀侵蚀消费者购买力，同时国防和福利支出持续增长。近期黄金回调大概率是短暂的，基本面支撑金价继续上行。"}, {"id": "03", "title": "升级差距：美国军事选择的困境与核门槛陷阱", "title_e nergy Crisis: An Affordable Escape from Fossil Fuels", "category": "产业投资", "tags": ["太阳能", "风能", "电池", "电动汽车", "热泵", "能源转型", "化石燃料"], "pages": "43-50", "summary": "电子技术——太阳能、风能、电池、电动汽车和热泵——提供了一条摆脱动荡化石能源世界的可负担出路。伊朗战争引发的能源冲击加速了清洁能源经济性的凸显。分析各技术路径的成本趋势与投资机会。"}, {"id": "10", "title": "美国与盟友关系恶化：瑞士资金转移的全球资本影响", "title_en": "US Alienating Allies: Swiss Fund Transfers and Global Capital Implications", "category": "地缘政治", "tags": ["美欧关系", "北约", "瑞士", "资本流动", "欧元债券", "德拉吉"], "pages": "50-55", "summary": "美国正积极破坏与盟友关系。通过未经授权转移瑞士资金，华盛顿正在鼓励其他国家重新考虑其商业和金融关系。分析对全球资本流动、欧洲防务自主化及欧元债券前景的深远影响。"}, {"id": "11", "title": "友谊的衰退：C.S.刘易斯与现代孤独", "title_en": "The Friendship Recession: C.S. Lewis and Modern Loneliness", "category": "思想与人文", "tags": ["友谊", "C.S.刘易斯", "社会衰退", "青少年", "孤独", "社群"], "pages": "55-60", "summary": "引用C.S.刘易斯《四种爱》探讨友谊的本质——'友谊没有生存价值，它是赋予生存以价值的事物之一'。分析美国'友谊衰退'现象、青少年社会发展的危机，以及现代社会中人际连接的瓦解。"}], "has_full": true}, {"report_id": "WILTW-2026-04-16", "date": "2026-04-16", "title": "What I Learned This Week", "publisher": "13D Research & Strategy", "total_pages": 66, "sections": [{"id": "00", "title": "策略与资产配置及高确信度投资理念的表现", "title_en": "Strategy & Asset Allocation — High Conviction Investment Ideas Performance", "category": "投资策略", "tags": ["中国股票", "长期牛市", "黄金", "白银", "资产配置", "高确信度组合"], "pages": "3-4", "summary": "西方投资者长期以来面临\"中国是否不可投资\"的疑问。作为长期逆向投资者，13D认为中国股票正处于长期牛市的早期阶段。黄金/CPI比率突破了45年下降趋势线，黄金矿业股相对于美国主要股指的超额表现已经突破。白银相对于黄金表现优异，白银矿业股相对表现突破几乎所有全球主要股指。高确信度投资组合配置集中在黄金(30.1%)、白银(15.1%)等领域。"}, {"id": "01", "title": "学习曲线：现代战争——谁领先、谁落后", "title_en": "Learning Curve: Modern Warfare — Who's Ahead, Who's Behind", "category": "科技与社会", "tags": ["现代战争", "伊朗", "乌克兰", "空中力量", "无人机", "防区外导弹", "代理人战争"], "pages": "5-9", "summary": "通过伊朗和乌克兰的冲突，分析现代战争各领域的竞争态势。涵盖空中力量（空军已过时，导弹为王）、地面战（FPV无人机+短程弹道导弹改变作战方式）、海战力量（无人艇颠覆传统海军）、代理人战争与盟友（依赖可靠的军工盟友至关重要）。结论：制造业产能、导弹库和无人系统产能是决定胜负的关键。"}, {"id": "02", "title": "小盘矿业股的抛售是否已经结束？", "title_en": "Is the Junior Mining Stock Sell-Off Over?", "category": "贵金属", "tags": [ -30", "date": "2026-04-30", "title": "What I Learned This Week", "publisher": "13D Research & Strategy", "total_pages": 65, "sections": [{"id": "00", "title": "策略与资产配置及高信念组合表现", "title_en": "Strategy & Asset Allocation & Performance of High Conviction Ideas", "category": "投资策略", "tags": ["范式转换", "大宗商品", "黄金", "中国牛市", "高信念组合"], "pages": "3-4", "summary": "自2020年9月以来，13D持续论证大宗商品、商品相关板块及长期低迷市场将成为新市场龙头。黄金突破关键阻力位，中国A股进入结构性牛市。高信念组合本周及年初至今表现亮眼，黄金、铜、铝、化肥等仓位领涨。"}, {"id": "01", "title": "美伊战争引发的化肥供应中断可能引爆全球社会政治动荡", "title_en": "US-Iran War Fertilizer Disruption & Global Food Price Unrest", "category": "地缘政治", "tags": ["化肥", "霍尔木兹海峡", "粮食安全", "社会动荡", "尿素", "磷酸盐"], "pages": "5-13", "summary": "美国-伊朗战争导致的霍尔木兹海峡封锁，切断了全球化肥关键原料（硫磺、磷矿、尿素）的运输通道。能源作物大国巴西面临严重化肥短缺；埃及、印尼、孟加拉、印度等粮食进口国面临食品价格暴涨和社会动荡风险。发达国家也难以幸免，输入性通胀将推高全球食品价格。"}, {"id": "02", "title": "铝会成为下一个铜吗？中国铝冶炼厂变身印钞机", "title_en": "Is Aluminum the Next Copper? Chinese Smelters as Cash Machines", "category": "关键矿产", "tags": ["铝", "中国铝业", "云铝股份", "神火股份", "高股息", "现金牛"], "pages": "15-17", "summary": "中国铝冶炼厂一季度利润和经营现金流同比三位数增长，今年股息有望翻倍。云铝股份和神火股份被纳入13D中国深度价值高股息指数。全球铝供应短缺加剧，中国产能上限政策使冶炼厂成为稀缺资产。"}, {"id": "03", "title": "铜供应危机加剧——硫酸短缺与电力基础设施需求双杀", "title_en": "Copper Supply Crisis: Sulfuric Acid Disruption & Electrical Demand", "category": "关键矿产", "tags": ["铜", "硫酸", "SX-EW", "霍尔木兹", "可再生能源", "Eldorado Gold"], "pages": "18-26", "summary": "霍尔木兹封锁导致硫磺供应中断，全球铜矿湿法冶炼（SX-EW）面临硫酸短缺，约占全球铜产量15-20%。电力基础设施建设正在取代房地产成为铜需求第一大驱动力。Eldorado Gold被重新评估为被低估的铜增长标的。"}, {"id": "04", "title": "俄乌战争为何仍未结束？对伊朗冲突的启示", "title_en": "Why Hasn't the Russia-Ukraine War Ended? Lessons for Iran", "category": "地缘政治", "tags": ["俄乌战争", "俄罗斯", "伊朗", "制裁", "经济韧性", "西方情报失败"], "pages": "27-30", "summary": "俄罗斯经济展现出超预期的韧性，西方制裁未能击垮其战争机器。乌克兰完全依赖西方援助，兵员和弹药双双枯竭。俄罗斯以战略耐心等待西方民意转向。美国经济、外交和军事杠杆全面衰落，伊朗冲突可能重演类似剧本。"}, {"id": "05", "title": "「互联网中毒的唯一解药是祈祷」——年轻人为何拥抱宗教", "title_en": "Young People Embracing Religion as Antidote to Internet Poisoning", "category": "科技与社会", "tags": ["宗教", "Z世代", "孤独 function toggleTag(t){activeTag=activeTag===t?null:t;renderTagCloud();filterReports()}
function filterReports(){const q=document.getElementById('searchInput').value.toLowerCase(),cf=document.getElementById('catFilter').value;let vs=[];data.reports.forEach(r=>r.sections.forEach(s=>{if(cf!=='all'&&s.category!==cf)return;if(activeTag&&!s.tags.includes(activeTag))return;if(q){const st=(s.title+' '+s.summary+' '+s.tags.join(' ')).toLowerCase();if(!st.includes(q))return}vs.push({report:r,section:s})}));document.getElementById('stats').textContent='共 '+data.reports.length+' 期报告 · '+vs.length+' 个匹配条目';const g={};vs.forEach(({report:r,section:s})=>{if(!g[s.category])g[s.category]=[];g[s.category].push({report:r,section:s})});const l=document.getElementById('reportList');if(vs.length===0){l.innerHTML='<div class="empty">📭 没有匹配的内容</div>';return}l.innerHTML=Object.entries(g).map(([cat,items])=>'<div class="cat-section"><div class="cat-header">'+cat+' <span class="count">'+items.length+'</span></div>'+items.map(({report:r,section:s})=>'<div class="report-card cat-'+cat+(r.has_full?' has-full':' meta-only')+'" onclick="openDetail(\''+r.report_id+'\',\''+s.id+'\')"><div class="meta"><span class="date">📅 '+r.date+'</span>'+(r.has_full?'<span class="report-badge full">✓ 完整</span>':'<span class="report-badge meta">仅摘要</span>')+'<span class="cat-badge cat-'+cat+'">'+cat+'</span></div><h3>'+s.id+'. '+s.title+'</h3><div class="summary">'+s.summary+'</div><div class="tags">'+s.tags.map(t=>'<span class="mini-tag">#'+t+'</span>').join(' ')+'</div></div>').join('')+'</div>').join('')}
function openDetail(rid,sid){const r=data.reports.find(x=>x.report_id===rid);if(!r)return;const s=r.sections.find(x=>x.id===sid)||r.sections[0];currentReportId=rid;document.getElementById('modalTitle').textContent=r.date+' · '+s.title;document.getElementById('modalBody').innerHTML='<p style="color:#888;margin-bottom:1rem">📰 '+r.publisher+' · 共'+r.total_pages+'页 · '+r.sections.length+' 个主题</p>'+r.sections.map(x=>'<h3 style="color:'+(x.id===sid?'#e0c068':'#888')+'">'+x.id+'. '+x.title+' <span style="font-size:0.75rem;font-weight:normal">['+x.pages+'页]</span></h3><div class="section-summary">'+x.summary+'</div><div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:1rem">'+x.tags.map(t=>'<span class="mini-tag">#'+t+'</span>').join(' ')+'</div>').join('');const b=document.getElementById('btnOpenReport');if(r.has_full){b.disabled=false;b.textContent='📄 查看完整中文报告';b.style.background='#1a1a2e';b.style.color='#fff';b.onclick=function(){window.open('reports/'+rid+'.html','_blank')}}else{b.disabled=true;b.textContent='⏳ 完整翻译正在生成中...';b.style.background='#ccc';b.style.color='#666';b.onclick=null}document.getElementById('modal').classList.add('active');document.body.style.overflow='hidden'}
function closeModal(){document.getElementById('modal').classList.remove('active');document.body.style.overflow=''}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus()}});
init();
</script>
</body>
</html>
