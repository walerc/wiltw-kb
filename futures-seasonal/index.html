<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>е•Ҷе“Ғжңҹиҙ§еӯЈиҠӮжҖ§еҲҶжһҗ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }
/* Sidebar */
.sidebar { position:fixed; left:0; top:0; bottom:0; width:220px; background:#161b22; border-right:1px solid #21262d; padding:20px 0; overflow-y:auto; z-index:10; }
.sidebar h2 { font-size:.85rem; color:#8b949e; padding:0 20px; margin-bottom:16px; text-transform:uppercase; letter-spacing:.05em; }
.sidebar .sector { display:block; padding:8px 20px; color:#c9d1d9; text-decoration:none; font-size:.85rem; border-left:2px solid transparent; transition:all .15s; cursor:pointer; }
.sidebar .sector:hover { background:#1c2128; color:#f0c060; }
.sidebar .sector.active { background:#1c2735; border-left-color:#f0c060; color:#f0c060; }
.sidebar .sector .count { float:right; color:#8b949e; font-size:.75rem; margin-top:1px; }
.sidebar .divider { border:none; border-top:1px solid #21262d; margin:12px 20px; }
.sidebar .updated { padding:0 20px; font-size:.7rem; color:#484f58; margin-top:20px; }
/* Main */
.main { margin-left:220px; padding:24px 32px; min-height:100vh; }
.main h1 { font-size:1.4rem; color:#f0c060; margin-bottom:4px; }
.main .sub { color:#8b949e; font-size:.8rem; margin-bottom:24px; }
/* Controls */
.controls { display:flex; gap:10px; margin-bottom:20px; align-items:center; }
.controls input { flex:1; max-width:300px; padding:8px 12px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:.85rem; }
.controls input:focus { outline:none; border-color:#f0c060; }
/* Section */
.section { margin-bottom:32px; }
.section-title { font-size:1rem; color:#f0c060; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #21262d; display:flex; align-items:center; gap:8px; }
.section-title .badge { font-size:.7rem; background:#f0c06020; color:#f0c060; padding:2px 8px; border-radius:10px; font-weight:400; }
/* Table */
.table-wrap { overflow-x:auto; background:#161b22; border:1px solid #21262d; border-radius:8px; margin-bottom:8px; }
table { width:100%; border-collapse:collapse; font-size:.82rem; }
th, td { padding:9px 12px; text-align:right; border-bottom:1px solid #21262d; white-space:nowrap; }
th { background:#1c2128; color:#8b949e; font-weight:600; position:sticky; top:0; cursor:pointer; user-select:none; }
th:hover { color:#f0c060; }
th:first-child, td:first-child { text-align:left; position:sticky; left:0; background:#161b22; z-index:1; }
th:first-child { background:#1c2128; z-index:2; }
tr:hover td { background:#1c2735; }
tr:hover td:first-child { background:#1c2735; }
tr.selected td { background:#f0c06008; }
tr.selected td:first-child { background:#f0c06008; border-left:3px solid #f0c060; }
.positive { color:#3fb950; }
.negative { color:#f85149; }
.code { font-family:'SF Mono',monospace; color:#f0c060; font-weight:600; font-size:.8rem; }
.name { margin-left:8px; color:#c9d1d9; }
.yr { color:#8b949e; font-size:.75rem; }
/* Detail panel */
.detail-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:20; }
.detail-overlay.active { display:flex; align-items:center; justify-content:center; }
.detail-panel { background:#161b22; border:1px solid #30363d; border-radius:12px; width:90%; max-width:1100px; max-height:85vh; overflow-y:auto; }
.detail-header { padding:16px 20px; border-bottom:1px solid #21262d; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:#161b22; z-index:2; }
.detail-header h2 { font-size:1.1rem; color:#f0c060; }
.detail-close { background:none; border:none; color:#8b949e; font-size:1.4rem; cursor:pointer; padding:4px 8px; }
.detail-close:hover { color:#f85149; }
.detail-body { padding:20px; }
.summary-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.stat-card { background:#0d1117; border:1px solid #21262d; border-radius:8px; padding:14px; text-align:center; }
.stat-card .label { font-size:.75rem; color:#8b949e; }
.stat-card .value { font-size:1.2rem; font-weight:700; margin-top:4px; }
.month-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:16px 0; }
.month-card { background:#0d1117; border:1px solid #21262d; border-radius:8px; padding:12px; }
.month-card.best { border-color:#3fb950; background:#3fb95006; }
.month-card.worst { border-color:#f85149; background:#f8514906; }
.month-card .mon { font-size:.8rem; color:#8b949e; margin-bottom:6px; }
.month-card .val { font-size:1.05rem; font-weight:700; }
.month-card .meta { font-size:.72rem; color:#8b949e; margin-top:4px; }
h4 { color:#8b949e; margin:20px 0 10px; font-size:.85rem; }
.chart-wrap { background:#0d1117; border:1px solid #21262d; border-radius:8px; padding:16px; margin:16px 0; }
.chart-wrap canvas { max-height:420px; }
.seasonal-summary { background:#0d1117; border:1px solid #30363d; border-left:3px solid #f0c060; border-radius:8px; padding:16px 20px; margin:16px 0; font-size:.85rem; line-height:1.7; color:#c9d1d9; }
.seasonal-summary p { margin:6px 0; }
/* Search highlight */
.hidden-section { display:none; }
@media (max-width:900px) { .sidebar { display:none; } .main { margin-left:0; padding:16px; } .month-grid { grid-template-columns:repeat(2,1fr); } .summary-stats { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>

<nav class="sidebar">
  <h2>рҹ“Ҡ жқҝеқ—еҜјиҲӘ</h2>
  <a class="sector active" data-sector="all">е…ЁйғЁе“Ғз§Қ <span class="count" id="count-all"></span></a>
  <hr class="divider">
  <a class="sector" data-sector="й»‘иүІзі»">вҡ« й»‘иүІзі» <span class="count"></span></a>
  <a class="sector" data-sector="жңүиүІйҮ‘еұһ">рҹҹ  жңүиүІйҮ‘еұһ <span class="count"></span></a>
  <a class="sector" data-sector="иҙөйҮ‘еұһ">рҹҹЎ иҙөйҮ‘еұһ <span class="count"></span></a>
  <a class="sector" data-sector="иғҪжәҗеҢ–е·Ҙ">рҹ”ө иғҪжәҗеҢ–е·Ҙ <span class="count"></span></a>
  <a class="sector" data-sector="еҶңдә§е“Ғ">рҹҹў еҶңдә§е“Ғ <span class="count"></span></a>
  <div class="updated" id="sidebar-updated"></div>
</nav>

<div class="main">
  <h1>рҹ“Ҳ е•Ҷе“Ғжңҹиҙ§еӯЈиҠӮжҖ§еҲҶжһҗ</h1>
  <div class="sub">еҹәдәҺдё»еҠӣиҝһз»ӯеҗҲзәҰеҺҶеҸІж•°жҚ® В· е…Ёе№ҙ12дёӘжңҲж¶Ёи·Ңе№…з»ҹи®Ў В· жңҖејәдёҠж¶Ёжіўж®өжү«жҸҸ</div>
  
  <div class="controls">
    <input type="text" id="search" placeholder="жҗңзҙўе“Ғз§Қд»Јз ҒжҲ–еҗҚз§°..." oninput="onSearch()">
  </div>

  <div id="content-area"></div>
</div>

<div class="detail-overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <h2 id="detail-title"></h2>
      <button class="detail-close" onclick="closeDetail()">вң•</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
// Sector definitions
const SECTORS = {
  'й»‘иүІзі»': {
    codes: ['RB','HC','I','J','JM','SS','FG','SM','SF'],
    name: 'вҡ« й»‘иүІзі»', desc: 'иһәзә№й’ўВ·зғӯеҚ·В·й“ҒзҹҝзҹіВ·з„ҰзӮӯВ·з„Ұз…ӨВ·дёҚй”Ҳй’ўВ·зҺ»з’ғВ·й”°зЎ…В·зЎ…й“Ғ'
  },
  'жңүиүІйҮ‘еұһ': {
    codes: ['CU','AL','ZN','PB','NI','SN','AO','BC'],
    name: 'рҹҹ  жңүиүІйҮ‘еұһ', desc: 'жІӘй“ңВ·жІӘй“қВ·жІӘй”ҢВ·жІӘй“…В·жІӘй•ҚВ·жІӘй”ЎВ·ж°§еҢ–й“қВ·еӣҪйҷ…й“ң'
  },
  'иҙөйҮ‘еұһ': {
    codes: ['AU','AG'],
    name: 'рҹҹЎ иҙөйҮ‘еұһ', desc: 'жІӘйҮ‘В·жІӘй“¶'
  },
  'иғҪжәҗеҢ–е·Ҙ': {
    codes: ['SC','FU','LU','BU','PG','TA','MA','L','PP','V','EG','EB','SA','UR','SH','PF','RU','NR','SP'],
    name: 'рҹ”ө иғҪжәҗеҢ–е·Ҙ', desc: 'еҺҹжІ№В·зҮғжІ№В·жІҘйқ’В·PTAВ·з”ІйҶҮВ·еЎ‘ж–ҷВ·PPВ·PVCВ·д№ҷдәҢйҶҮВ·иӢҜд№ҷзғҜВ·зәҜзўұВ·е°ҝзҙ В·зғ§зўұВ·зҹӯзәӨВ·ж©Ўиғ¶В·зәёжөҶ'
  },
  'еҶңдә§е“Ғ': {
    codes: ['M','Y','P','A','B','C','CS','SR','CF','RM','OI','AP','CJ','PK','JD','LH'],
    name: 'рҹҹў еҶңдә§е“Ғ', desc: 'иұҶзІ•В·иұҶжІ№В·жЈ•жҰҲжІ№В·зҺүзұіВ·зҷҪзі–В·жЈүиҠұВ·иҸңзІ•В·иҸңжІ№В·иӢ№жһңВ·зәўжһЈВ·иҠұз”ҹВ·йёЎиӣӢВ·з”ҹзҢӘ'
  }
};

let allProducts = {};
let currentSector = 'all';
const monthNames = ['1жңҲ','2жңҲ','3жңҲ','4жңҲ','5жңҲ','6жңҲ','7жңҲ','8жңҲ','9жңҲ','10жңҲ','11жңҲ','12жңҲ'];

async function init() {
  try {
    const resp = await fetch('data/index.json');
    const idx = await resp.json();
    allProducts = idx.products;
    document.getElementById('sidebar-updated').textContent = `ж•°жҚ®жӣҙж–°: ${idx.updated}`;
    
    // Update sidebar counts
    document.getElementById('count-all').textContent = idx.total;
    for (const [sector, cfg] of Object.entries(SECTORS)) {
      const count = cfg.codes.filter(c => allProducts[c]).length;
      const el = document.querySelector(`[data-sector="${sector}"] .count`);
      if (el) el.textContent = count;
    }
    
    render();
  } catch(e) {
    document.getElementById('content-area').innerHTML = '<p style="color:#8b949e;padding:40px;text-align:center;">ж•°жҚ®еҠ иҪҪдёӯпјҢиҜ·зӯүеҫ…жү№йҮҸеҲҶжһҗе®ҢжҲҗеҗҺеҲ·ж–°вҖҰ</p>';
  }
}

// Sidebar click
document.querySelectorAll('.sector').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.sector').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    currentSector = el.dataset.sector;
    render();
  });
});

function onSearch() {
  currentSector = 'search';
  document.querySelectorAll('.sector').forEach(e => e.classList.remove('active'));
  render();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  
  if (search) {
    // Search mode - show matching across all sectors
    const matched = Object.values(allProducts).filter(p => 
      p.code.toLowerCase().includes(search) || p.name.includes(search)
    );
    document.getElementById('content-area').innerHTML = 
      `<div class="section">
        <div class="section-title">рҹ”Қ жҗңзҙў: "${search}" <span class="badge">${matched.length}дёӘз»“жһң</span></div>
        ${buildTable(matched)}
      </div>`;
    return;
  }
  
  if (currentSector === 'all') {
    // Show all by sector
    let html = '';
    for (const [sector, cfg] of Object.entries(SECTORS)) {
      const products = cfg.codes.map(c => allProducts[c]).filter(Boolean);
      if (products.length === 0) continue;
      html += `<div class="section" id="sec-${sector}">
        <div class="section-title">${cfg.name} <span class="badge">${products.length}дёӘ</span></div>
        <div style="color:#8b949e;font-size:.75rem;margin-bottom:8px;">${cfg.desc}</div>
        ${buildTable(products)}
      </div>`;
    }
    document.getElementById('content-area').innerHTML = html;
  } else {
    const cfg = SECTORS[currentSector];
    const products = cfg.codes.map(c => allProducts[c]).filter(Boolean);
    document.getElementById('content-area').innerHTML = 
      `<div class="section">
        <div class="section-title">${cfg.name} <span class="badge">${products.length}дёӘ</span></div>
        <div style="color:#8b949e;font-size:.75rem;margin-bottom:8px;">${cfg.desc}</div>
        ${buildTable(products)}
      </div>`;
  }
}

function buildTable(products) {
  if (products.length === 0) return '<p style="color:#8b949e;padding:20px;">жҡӮж— ж•°жҚ®</p>';
  // Sort by all_month_mean descending
  products.sort((a,b) => (b.all_month_mean||0) - (a.all_month_mean||0));
  
  let rows = products.map(p => `
    <tr onclick="showDetail('${p.code}')" id="row-${p.code}" style="cursor:pointer">
      <td><span class="code">${p.code}</span><span class="name">${p.name}</span></td>
      <td class="yr">${p.n_years}е№ҙ</td>
      <td class="${p.all_month_mean>=0?'positive':'negative'}">${p.all_month_mean>=0?'+':''}${p.all_month_mean.toFixed(2)}%</td>
      <td>${monthNames[p.best_month-1]}</td>
      <td class="positive">+${p.best_month_mean.toFixed(2)}%</td>
      <td>${monthNames[p.worst_month-1]}</td>
      <td class="negative">${p.worst_month_mean.toFixed(2)}%</td>
    </tr>
  `).join('');
  
  return `<div class="table-wrap">
    <table>
      <thead><tr>
        <th>е“Ғз§Қ</th><th>еҺҶеҸІ</th><th>жңҲеқҮж¶Ёи·Ң</th><th>жңҖдҪіжңҲ</th><th>жңҖдҪіж¶Ёе№…</th><th>жңҖе·®жңҲ</th><th>жңҖе·®и·Ңе№…</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

async function showDetail(code) {
  document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
  document.getElementById(`row-${code}`)?.classList.add('selected');
  
  try {
    const resp = await fetch(`data/${code}.json`);
    const d = await resp.json();
    document.getElementById('detail-title').textContent = `${d.code} ${d.name} В· ${d.data_range}`;
    document.getElementById('overlay').classList.add('active');
    
    let html = `<div class="summary-stats">
      <div class="stat-card"><div class="label">жңҲеқҮж¶Ёи·Ң</div><div class="value ${d.all_month_mean>=0?'positive':'negative'}">${d.all_month_mean>=0?'+':''}${d.all_month_mean}%</div></div>
      <div class="stat-card"><div class="label">жңҖдҪіжңҲ</div><div class="value positive">${monthNames[d.best_month-1]} +${d.best_month_mean}%</div></div>
      <div class="stat-card"><div class="label">жңҖе·®жңҲ</div><div class="value negative">${monthNames[d.worst_month-1]} ${d.worst_month_mean}%</div></div>
      <div class="stat-card"><div class="label">ж•°жҚ®е№ҙд»Ҫ</div><div class="value" style="font-size:.95rem;color:#c9d1d9;">${d.data_range}</div></div>
    </div>
    ${d.summary ? `<div class="seasonal-summary">${d.summary.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</div>` : ''}
    <div class="chart-wrap"><canvas id="detail-chart"></canvas></div>`;
    
    html += '<h4>рҹ“… жңҲеәҰж¶Ёи·Ңе№…</h4><div class="month-grid">';
    for (let m=0; m<12; m++) {
      const s = d.monthly[m];
      if (!s) {
        html += '<div class="month-card"><div class="mon">'+(m+1)+'жңҲ</div><div class="val" style="color:#8b949e;">вҖ”</div></div>';
        continue;
      }
      const isBest = (m+1)===d.best_month, isWorst = (m+1)===d.worst_month;
      let cls = 'month-card';
      if (isBest) cls += ' best'; else if (isWorst) cls += ' worst';
      html += `<div class="${cls}">
        <div class="mon">${monthNames[m]}</div>
        <div class="val ${s.mean>=0?'positive':'negative'}">${s.mean>=0?'+':''}${s.mean}%</div>
        <div class="meta">иғңзҺҮ${s.win_rate}% В· Пғ${s.std}%</div>
        <div class="meta">вҶ‘${s.max_up>=0?'+':''}${s.max_up}% вҶ“${s.max_down}%</div>
      </div>`;
    }
    html += '</div>';
    
    html += '<h4>рҹ“Ҳ жҜҸжңҲжңҖејәдёҠж¶Ёжіўж®ө (вүҘ2%)</h4><div class="month-grid">';
    for (let m=0; m<12; m++) {
      const r = d.rallies[m];
      if (!r) {
        html += `<div class="month-card"><div class="mon">${m+1}жңҲ</div><div class="val" style="color:#8b949e;font-size:.85rem;">вҖ”</div></div>`;
        continue;
      }
      html += `<div class="month-card">
        <div class="mon">${m+1}жңҲ В· ${r.n_episodes}ж¬Ў</div>
        <div class="val positive" style="font-size:.95rem;">+${r.avg_gain}%</div>
        <div class="meta">жҢҒз»ӯ${r.avg_days}еӨ© В· еҗҜеҠЁз¬¬${r.avg_start_day}ж—Ҙ</div>
      </div>`;
    }
    html += '</div>';
    
    document.getElementById('detail-body').innerHTML = html;
    
    // з»ҳеҲ¶еӣҫиЎЁ
    setTimeout(() => {
      const ctx = document.getElementById('detail-chart');
      if (!ctx) return;
      if (ctx._chart) ctx._chart.destroy();
      
      if (d.yearly && Object.keys(d.yearly).length > 0) {
        // еӨҡе№ҙеҸ еҠ жҠҳзәҝеӣҫ
        const yrKeys = Object.keys(d.yearly).sort((a,b) => parseInt(a)-parseInt(b));
        const n = yrKeys.length;
        const datasets = yrKeys.map((yr, i) => {
          const t = n > 1 ? i/(n-1) : 0.5;
          const recent = parseInt(yr) >= 2020;
          const hue = (i * 360 / n) % 360;
          return {
            label: yr, data: d.yearly[yr],
            borderColor: `hsla(${hue},60%,${40+t*30}%,${0.2+t*0.5})`,
            backgroundColor: 'transparent',
            borderWidth: recent ? 2.2 : 1.0,
            pointRadius: recent ? 2.5 : 0,
            pointHoverRadius: 5, tension: 0.25,
            spanGaps: false, order: recent ? 0 : 1,
          };
        });
        // еқҮеҖјзәҝ
        const avg = d.monthly.map(s => s ? s.mean : null);
        datasets.push({
          label: 'рҹ“Ҡ еқҮеҖј', data: avg,
          borderColor: '#f0c060', borderWidth: 3,
          borderDash: [8,4], pointRadius: 4,
          pointBackgroundColor: '#f0c060',
          pointBorderColor: '#0d1117', pointBorderWidth: 1,
          tension: 0.3, spanGaps: false, order: -1,
        });
        ctx._chart = new Chart(ctx, {
          type: 'line',
          data: { labels: monthNames, datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: {
                position: 'right',
                labels: {
                  color: '#8b949e', font: { size: 9 },
                  boxWidth: 14, boxHeight: 2, padding: 6,
                  filter: (item) => {
                    if (item.text === 'рҹ“Ҡ еқҮеҖј') return true;
                    const yr = parseInt(item.text);
                    return yr >= 2018;
                  },
                },
              },
              tooltip: {
                callbacks: {
                  label: (ctx) => ctx.raw !== null
                    ? `${ctx.dataset.label}: ${ctx.raw>=0?'+':''}${ctx.raw.toFixed(2)}%`
                    : `${ctx.dataset.label}: вҖ”`,
                },
              },
            },
            scales: {
              y: { grid: { color: '#21262d' }, ticks: { color:'#8b949e', callback:v=>(v>=0?'+':'')+v+'%' } },
              x: { grid: { display: false }, ticks: { color:'#8b949e' } },
            },
          },
        });
      } else {
        // fallback: жҹұзҠ¶еӣҫ
        const means = d.monthly.map(s => s ? s.mean : null);
        const winRates = d.monthly.map(s => s ? s.win_rate : null);
        const colors = means.map(v => v === null ? '#30363d' : v >= 0 ? '#3fb950' : '#f85149');
        ctx._chart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: monthNames,
            datasets: [{
              label:'жңҲеқҮж¶Ёи·Ңе№…', data: means,
              backgroundColor: colors.map(c => c+'60'),
              borderColor: colors, borderWidth: 1.5, borderRadius: 4,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => `еқҮеҖј ${ctx.raw>=0?'+':''}${ctx.raw?.toFixed(2)??'вҖ”'}%`,
                  afterLabel: ctx => winRates[ctx.dataIndex] !== null ? `иғңзҺҮ ${winRates[ctx.dataIndex]}%` : '',
                },
              },
            },
            scales: {
              y: { grid: { color:'#21262d' }, ticks: { color:'#8b949e', callback:v=>(v>=0?'+':'')+v+'%' } },
              x: { grid: { display:false }, ticks: { color:'#8b949e' } },
            },
          },
        });
      }
    }, 80);
  } catch(e) { console.error(e); }
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('active');
  document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });
init();
</script>
</body>
</html>
